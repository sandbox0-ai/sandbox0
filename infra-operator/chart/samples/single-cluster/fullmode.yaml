# Example: Single-cluster full mode (internal-gateway + manager + storage + network)
apiVersion: v1
kind: Namespace
metadata:
  name: sandbox0-system
---
apiVersion: infra.sandbox0.ai/v1alpha1
kind: Sandbox0Infra
metadata:
  name: fullmode
  namespace: sandbox0-system
spec:
  version: "latest"
  database:
    # Use builtin for quick start; switch to external for managed PG.
    type: builtin
    builtin:
      enabled: true
      persistence:
        enabled: true
        size: "20Gi"
  # Example external database:
  # database:
  #   type: external
  #   external:
  #     host: your-db.rds.amazonaws.com
  #     port: 5432
  #     database: sandbox0
  #     username: sandbox0
  #     passwordSecret:
  #       name: db-credentials
  #       key: password
  storage:
    # Builtin storage is for quick start; use s3/oss for production scale.
    type: builtin
    builtin:
      enabled: true
      persistence:
        enabled: true
        size: "20Gi"
  # Example S3 storage:
  # storage:
  #   type: s3
  #   s3:
  #     bucket: sandbox0-prod
  #     region: us-east-1
  #     endpoint: https://s3.amazonaws.com
  #     credentialsSecret:
  #       name: aws-credentials
  #       accessKeyKey: accessKeyId
  #       secretKeyKey: secretAccessKey
  registry:
    # Builtin registry is for quick start; external registries use provider config.
    provider: builtin
    builtin:
      enabled: true
  # Example external AWS registry:
  # registry:
  #   provider: aws
  #   aws:
  #     region: us-east-1
  #     registryId: "123456789012"
  #     pullSecret:
  #       name: ecr-pull-secret
  #       key: .dockerconfigjson
  #     credentialsSecret:
  #       name: aws-credentials
  #       accessKeyKey: accessKeyId
  #       secretKeyKey: secretAccessKey
  builtinTemplates:
    - templateId: default
      image: sandbox0ai/otemplates:default-v0.1.0
      displayName: Default
      description: Builtin template installed by infra-operator.
      pool:
        minIdle: 1
        maxIdle: 5
        autoScale: true
  services:
    internalGateway:
      enabled: true
      replicas: 1
      config:
        authMode: public
    netd:
      enabled: true
    manager:
      enabled: true
      replicas: 1
    storageProxy:
      enabled: true
      replicas: 1
      config:
        juicefsEncryptionEnabled: false
  initUser:
    email: "admin@example.com"
    # passwordSecret:
    #   name: admin-password
    #   key: password
