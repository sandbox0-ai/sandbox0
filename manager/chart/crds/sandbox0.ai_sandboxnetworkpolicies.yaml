---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: sandboxnetworkpolicies.sandbox0.ai
spec:
  group: sandbox0.ai
  names:
    kind: SandboxNetworkPolicy
    listKind: SandboxNetworkPolicyList
    plural: sandboxnetworkpolicies
    singular: sandboxnetworkpolicy
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SandboxNetworkPolicy defines network policy for a sandbox (instance-level)
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SandboxNetworkPolicySpec defines the desired state of SandboxNetworkPolicy
            properties:
              audit:
                description: Audit defines audit configuration
                properties:
                  level:
                    default: basic
                    description: Level is the audit level (off, basic, full)
                    enum:
                    - "off"
                    - basic
                    - full
                    type: string
                  sampleRate:
                    default: 1
                    description: SampleRate is the sampling rate for audit logs (0.0-1.0)
                    pattern: ^(0(\.\d+)?|1(\.0+)?)$
                    type: string
                type: object
              egress:
                description: Egress defines outbound traffic rules (default deny)
                properties:
                  allowedCidrs:
                    description: AllowedCIDRs is a list of allowed destination CIDRs
                    items:
                      type: string
                    type: array
                  allowedDomains:
                    description: AllowedDomains is a list of allowed destination domains
                      (supports wildcards like *.example.com)
                    items:
                      type: string
                    type: array
                  alwaysDeniedCidrs:
                    description: |-
                      AlwaysDeniedCIDRs are platform-enforced deny CIDRs (user cannot override)
                      This includes RFC1918, metadata services, cluster services, etc.
                    items:
                      type: string
                    type: array
                  defaultAction:
                    default: deny
                    description: DefaultAction is the default action for egress traffic
                      (deny or allow)
                    enum:
                    - deny
                    - allow
                    type: string
                  deniedCidrs:
                    description: DeniedCIDRs is a list of denied destination CIDRs
                    items:
                      type: string
                    type: array
                  deniedDomains:
                    description: DeniedDomains is a list of denied destination domains
                    items:
                      type: string
                    type: array
                  dnsPolicy:
                    description: DNSPolicy defines DNS access policy
                    properties:
                      allowDoH:
                        description: AllowDoH allows DNS over HTTPS
                        type: boolean
                      allowDoT:
                        description: AllowDoT allows DNS over TLS
                        type: boolean
                      allowQuic:
                        description: AllowQUIC allows DNS over QUIC
                        type: boolean
                      allowedServers:
                        description: |-
                          AllowedServers is a list of allowed DNS servers
                          If empty, defaults to cluster DNS
                        items:
                          type: string
                        type: array
                    type: object
                  enforceProxyPorts:
                    description: EnforceProxyPorts are ports that must go through
                      the L7 proxy (e.g., 80, 443)
                    items:
                      format: int32
                      type: integer
                    type: array
                type: object
              ingress:
                description: Ingress defines inbound traffic rules (default deny)
                properties:
                  allowedPorts:
                    description: AllowedPorts is a list of allowed destination ports
                      (ports on the sandbox)
                    items:
                      description: PortSpec defines a port specification
                      properties:
                        endPort:
                          description: EndPort for port ranges (optional)
                          format: int32
                          type: integer
                        port:
                          description: Port number
                          format: int32
                          type: integer
                        protocol:
                          default: tcp
                          description: Protocol (tcp or udp)
                          enum:
                          - tcp
                          - udp
                          type: string
                      required:
                      - port
                      type: object
                    type: array
                  allowedSourceCidrs:
                    description: AllowedSourceCIDRs is a list of allowed source CIDRs
                    items:
                      type: string
                    type: array
                  defaultAction:
                    default: deny
                    description: DefaultAction is the default action for ingress traffic
                      (deny or allow)
                    enum:
                    - deny
                    - allow
                    type: string
                  deniedSourceCidrs:
                    description: DeniedSourceCIDRs is a list of denied source CIDRs
                    items:
                      type: string
                    type: array
                type: object
              sandboxId:
                description: SandboxID is the unique identifier of the sandbox this
                  policy applies to
                type: string
              teamId:
                description: TeamID is the team that owns this sandbox
                type: string
            required:
            - sandboxId
            - teamId
            type: object
          status:
            description: SandboxNetworkPolicyStatus defines the observed state of
              SandboxNetworkPolicy
            properties:
              conditions:
                description: Conditions represent the latest available observations
                items:
                  description: NetworkPolicyCondition defines a condition of the network
                    policy
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              lastAppliedTime:
                description: LastAppliedTime is the last time the policy was applied
                format: date-time
                type: string
              message:
                description: Message provides additional information about the status
                type: string
              observedGeneration:
                description: ObservedGeneration is the generation observed by netd
                format: int64
                type: integer
              phase:
                description: Phase is the current phase of the policy
                enum:
                - Pending
                - Applied
                - Failed
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
