apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.internalJwtKeySecretName }}
  labels:
    {{- include "internal-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Database connection string
  database-url: {{ .Values.secrets.databaseUrl | quote }}
  
  # JWT secret for token signing
  jwt-secret: {{ .Values.secrets.jwtSecret | quote }}
