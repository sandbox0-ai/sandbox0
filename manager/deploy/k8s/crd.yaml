apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sandboxtemplates.sandbox0.ai
spec:
  group: sandbox0.ai
  names:
    kind: SandboxTemplate
    listKind: SandboxTemplateList
    plural: sandboxtemplates
    singular: sandboxtemplate
    shortNames:
      - sbt
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - mainContainer
                - resources
                - pool
                - envdVersion
              properties:
                description:
                  type: string
                displayName:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                mainContainer:
                  type: object
                  required:
                    - image
                  properties:
                    image:
                      type: string
                    imagePullPolicy:
                      type: string
                    command:
                      type: array
                      items:
                        type: string
                    args:
                      type: array
                      items:
                        type: string
                    env:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          value:
                            type: string
                    resources:
                      type: object
                      properties:
                        limits:
                          type: object
                          additionalProperties:
                            type: string
                        requests:
                          type: object
                          additionalProperties:
                            type: string
                    securityContext:
                      type: object
                      properties:
                        capabilities:
                          type: object
                          properties:
                            add:
                              type: array
                              items:
                                type: string
                            drop:
                              type: array
                              items:
                                type: string
                        runAsUser:
                          type: integer
                          format: int64
                        runAsGroup:
                          type: integer
                          format: int64
                sidecars:
                  type: array
                  items:
                    type: object
                resources:
                  type: object
                  required:
                    - cpu
                    - memory
                  properties:
                    cpu:
                      type: string
                    memory:
                      type: string
                    gpu:
                      type: string
                pool:
                  type: object
                  required:
                    - minIdle
                    - maxIdle
                  properties:
                    minIdle:
                      type: integer
                      format: int32
                      minimum: 0
                    maxIdle:
                      type: integer
                      format: int32
                      minimum: 0
                envdVersion:
                  type: string
                runtimeClassName:
                  type: string
                envVars:
                  type: object
                  additionalProperties:
                    type: string
                public:
                  type: boolean
                allowedTeams:
                  type: array
                  items:
                    type: string
                aliases:
                  type: array
                  items:
                    type: string
            status:
              type: object
              properties:
                idleCount:
                  type: integer
                  format: int32
                activeCount:
                  type: integer
                  format: int32
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                lastUpdateTime:
                  type: string
                  format: date-time
      additionalPrinterColumns:
        - name: Idle
          type: integer
          jsonPath: .status.idleCount
        - name: Active
          type: integer
          jsonPath: .status.activeCount
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp

