apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "manager.serviceAccountName" . }}
  labels:
    {{- include "manager.labels" . | nindent 4 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "manager.fullname" . }}
  labels:
    {{- include "manager.labels" . | nindent 4 }}
rules:
  # SandboxTemplate CRD
  - apiGroups: ["sandbox0.ai"]
    resources: ["sandboxtemplates"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["sandbox0.ai"]
    resources: ["sandboxtemplates/status"]
    verbs: ["get", "update", "patch"]
  
  # Pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # ReplicaSets
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["create", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "manager.fullname" . }}
  labels:
    {{- include "manager.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "manager.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "manager.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
