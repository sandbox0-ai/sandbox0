apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sandboxbandwidthpolicies.sandbox0.ai
spec:
  group: sandbox0.ai
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - sandboxId
                - teamId
              properties:
                sandboxId:
                  type: string
                  description: "Unique identifier of the sandbox"
                teamId:
                  type: string
                  description: "Team that owns the sandbox"
                egressRateLimit:
                  type: object
                  description: "Egress rate limiting configuration"
                  properties:
                    rateBps:
                      type: integer
                      format: int64
                      description: "Rate limit in bits per second"
                    burstBytes:
                      type: integer
                      format: int64
                      description: "Burst size in bytes"
                    ceilBps:
                      type: integer
                      format: int64
                      description: "Ceiling rate in bits per second (for HTB)"
                ingressRateLimit:
                  type: object
                  description: "Ingress rate limiting configuration"
                  properties:
                    rateBps:
                      type: integer
                      format: int64
                      description: "Rate limit in bits per second"
                    burstBytes:
                      type: integer
                      format: int64
                      description: "Burst size in bytes"
                    ceilBps:
                      type: integer
                      format: int64
                      description: "Ceiling rate in bits per second (for HTB)"
                accounting:
                  type: object
                  description: "Traffic accounting configuration"
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    reportIntervalSeconds:
                      type: integer
                      default: 10
                      description: "Report interval in seconds (fixed at 10s per platform policy)"
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                lastAppliedTime:
                  type: string
                  format: date-time
                phase:
                  type: string
                  enum: ["Pending", "Applied", "Failed"]
                message:
                  type: string
                currentStats:
                  type: object
                  properties:
                    egressBytes:
                      type: integer
                      format: int64
                    ingressBytes:
                      type: integer
                      format: int64
                    egressPackets:
                      type: integer
                      format: int64
                    ingressPackets:
                      type: integer
                      format: int64
                    connectionCount:
                      type: integer
                      format: int64
                    lastUpdated:
                      type: string
                      format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Sandbox
          type: string
          jsonPath: .spec.sandboxId
        - name: Team
          type: string
          jsonPath: .spec.teamId
        - name: Egress Rate
          type: integer
          jsonPath: .spec.egressRateLimit.rateBps
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: sandboxbandwidthpolicies
    singular: sandboxbandwidthpolicy
    kind: SandboxBandwidthPolicy
    shortNames:
      - sbp

