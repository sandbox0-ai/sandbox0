# Default values for edge-gateway

replicaCount: 1

image:
  repository: sandbox0ai/edge-gateway
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: edge-gateway.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

nodeSelector: {}
tolerations: []
affinity: {}

# Secrets - only for file-based secrets (keys, certs)
# Uses global.jwt.internalJwtSecretName by default
secrets:
  internalJwtSecretName: ""  # defaults to {{ .Values.global.jwt.internalJwtSecretName }}
  internalJwtPrivateKeyKey: ""  # defaults to {{ .Values.global.jwt.privateKeyKey }}

# Application config - directly maps to config.yaml (snake_case)
config:
  edition: "self-hosted"
  http_port: 8080
  log_level: "info"
  internal_gateway_url: "http://internal-gateway:8443"
  
  # Scheduler configuration (for multi-cluster mode)
  # When enabled, template requests are routed to scheduler instead of internal-gateway
  scheduler_enabled: false
  scheduler_url: "http://scheduler:8080"

  # Database and JWT - uses global values by default
  # Override: set these to specific values to override global.*
  database_url: ""  # defaults to {{ .Values.global.database.url }}
  jwt_secret: ""  # defaults to {{ .Values.global.jwt.secret }}

  # JWT
  jwt_access_token_ttl: "15m"
  jwt_refresh_token_ttl: "168h"

  # Rate limiting
  rate_limit_rps: 100
  rate_limit_burst: 200

  # Timeouts
  proxy_timeout: "30s"
  shutdown_timeout: "30s"

  # Base URL for OIDC callbacks
  base_url: "http://localhost:8080"

  # Built-in authentication
  built_in_auth:
    enabled: true
    allow_registration: false
    email_verification_required: false
    admin_only: false
    # init_user can be configured via global.initUser (if enabled)

  # OIDC providers (optional)
  # oidc_providers:
  #   - id: "github"
  #     name: "GitHub"
  #     enabled: true
  #     client_id: "${GITHUB_CLIENT_ID}"
  #     client_secret: "${GITHUB_CLIENT_SECRET}"
  #     discovery_url: "https://github.com/.well-known/openid-configuration"
  #     scopes: ["openid", "email", "profile"]
  #     auto_provision: true
