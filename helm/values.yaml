# Global configuration shared across all services
# Override these values in production!
global:
  tag: &globalTag "v0.1.0"
  # Database configuration (shared by all services)
  database:
    url: "postgres://sandbox0:sandbox0@postgresql:5432/sandbox0?sslmode=disable"
  
  # JuiceFS metadata database (for storage-proxy)
  juicefs:
    meta_url: "postgres://juicefs:juicefs@postgresql:5432/juicefs?sslmode=disable"
    s3_bucket: "sandbox0-data"
    s3_region: "us-east-1"
    # S3-compatible endpoint used by JuiceFS data blocks.
    # When using the built-in RustFS subchart, this should point to the in-cluster service.
    s3_endpoint: "http://rustfs:9000"
    s3_access_key: "rustfsadmin"
    s3_secret_key: "rustfsadmin"
    s3_session_token: ""
  
  # JWT configuration
  jwt:
    # For edge-gateway user authentication
    secret: "change-me-in-production-use-strong-random-secret"
    
    # For internal service-to-service authentication
    # These are references to k8s secrets (created separately)
    internalJwtSecretName: "sandbox0-internal-jwt"
    privateKeyKey: "private.key"
    publicKeyKey: "public.key"
  
  # Optional: built-in auth initial user (edge-gateway)
  initUser:
    enabled: false
    email: "admin@localhost"
    password: "change-me-in-production"
    name: "Admin"

# Service-specific overrides (optional)
# Each service can override global values if needed
#
# ------------------------------------------------------------------------------
# Edge-gateway - Public API gateway
# ------------------------------------------------------------------------------
edge-gateway:
  replicaCount: 1
  
  image:
    repository: sandbox0ai/edge-gateway
    tag: *globalTag
  
  resources:
    #limits:
    #  cpu: 500m
    #  memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  
  service:
    type: LoadBalancer  # Change to ClusterIP if using Ingress
    port: 80
  
  # Ingress configuration (optional)
  ingress:
    enabled: false
    className: "nginx"
    annotations: {}
      # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: api.yourdomain.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
      # - secretName: edge-gateway-tls
      #   hosts:
      #     - api.yourdomain.com
  
  config:
    internal_gateway_url: "http://internal-gateway:8443"
    
    # Scheduler configuration (for multi-cluster mode)
    # When enabled, template requests are routed to scheduler instead of internal-gateway
    scheduler_enabled: false
    scheduler_url: "http://scheduler:8080"
    
    # Authentication providers
    built_in_auth:
      enabled: true
      allow_registration: false
      email_verification_required: false
      admin_only: false

# ------------------------------------------------------------------------------
# Internal-gateway - Internal service gateway
# ------------------------------------------------------------------------------
internal-gateway:
  replicaCount: 1
  
  image:
    repository: sandbox0ai/internal-gateway
    tag: *globalTag
  
  resources:
    #limits:
    #  cpu: 500m
    #  memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  
  config:
    manager_url: "http://manager:8080"
    storage_proxy_url: "http://storage-proxy:8081"
    # Allowed callers for internal auth validation
    # Add "scheduler" when using multi-cluster mode
    allowed_callers:
      - "edge-gateway"
      # - "scheduler"  # Uncomment for multi-cluster mode

# ------------------------------------------------------------------------------
# Manager - Kubernetes operator for sandbox lifecycle management
# ------------------------------------------------------------------------------
manager:
  replicaCount: 1
  
  image:
    repository: sandbox0ai/manager
    tag: *globalTag
  
  resources:
    #limits:
    #  cpu: 500m
    #  memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  
  config:
    default_template_name: "default"
    default_template_namespace: "sandbox0"
    default_template_image: "sandbox0ai/otemplates:default-v0.1.0"
  
  # Namespace management
  sandboxNamespace:
    create: true  # Set to false if namespace is managed externally

# ------------------------------------------------------------------------------
# Storage-proxy - JuiceFS storage proxy for persistent volumes
# ------------------------------------------------------------------------------
storage-proxy:
  replicaCount: 1
  
  image:
    repository: sandbox0ai/storage-proxy
    tag: *globalTag
  
  resources:
    #limits:
    #  cpu: 1000m
    #  memory: 2Gi
    requests:
      cpu: 200m
      memory: 512Mi
  
  # Cache configuration
  config:
    default_cache_size: "1G"   # per sandboxvolume
  
# ------------------------------------------------------------------------------
# Netd - Network daemon for L7 proxy and eBPF policies
# ------------------------------------------------------------------------------
netd:
  image:
    repository: sandbox0ai/netd
    tag: *globalTag
  
  resources:
    #limits:
    #  cpu: 200m
    #  memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  config:
    # Network policy - if true, blocks sandbox all traffic when netd is not ready
    fail_closed: true
    # use_ebpf enables eBPF-based bandwidth control (more efficient than tc htb)
    use_ebpf: true

# ------------------------------------------------------------------------------
# Scheduler - Multi-cluster template management (optional)
# ------------------------------------------------------------------------------
# Enable this for multi-cluster deployments to distribute templates across clusters.
# When enabled:
#   1. edge-gateway routes /api/v1/templates to scheduler
#   2. scheduler stores templates in PostgreSQL
#   3. scheduler distributes templates to clusters via internal-gateway
scheduler:
  enabled: false  # Set to true for multi-cluster mode
  
  replicaCount: 1
  
  image:
    repository: sandbox0ai/scheduler
    tag: *globalTag
  
  resources:
    #limits:
    #  cpu: 500m
    #  memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  config:
    reconcile_interval: "30s"
    cluster_timeout: "10s"

# ------------------------------------------------------------------------------
# RustFS - Built-in S3-compatible object storage (optional)
# ------------------------------------------------------------------------------
rustfs:
  enabled: true

  # For local/dev: keep it simple (1 pod + 1 PVC).
  replicaCount: 1
  mode:
    standalone:
      enabled: true
    distributed:
      enabled: false

  # Disable ingress by default; access RustFS via in-cluster service.
  ingress:
    enabled: false

  # The credentials should match global.juicefs.s3_access_key / s3_secret_key.
  secret:
    rustfs:
      access_key: "rustfsadmin"
      secret_key: "rustfsadmin"

  # Align region with global.juicefs.s3_region.
  config:
    rustfs:
      region: "us-east-1"

  # StorageClass used for RustFS PVCs.
  # Leave storageclass unset to use the cluster's default StorageClass
  # storageclass:
  #   name: ""

# ------------------------------------------------------------------------------
# PostgreSQL - Built-in database (optional)
# ------------------------------------------------------------------------------
postgresql:
  enabled: true

  # Create the primary app database/user.
  auth:
    enablePostgresUser: true
    postgresPassword: "postgres"
    username: "sandbox0"
    password: "sandbox0"
    database: "sandbox0"

  # Also initialize JuiceFS metadata DB/user.
  primary:
    initdb:
      user: "postgres"
      password: "postgres"
      scripts:
        01-init-juicefs.sql: |
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'juicefs') THEN
              CREATE ROLE juicefs LOGIN PASSWORD 'juicefs';
            END IF;
            IF NOT EXISTS (SELECT FROM pg_database WHERE datname = 'juicefs') THEN
              CREATE DATABASE juicefs OWNER juicefs;
            END IF;
          END
          $$;

    persistence:
      enabled: true
      size: 20Gi
      # Leave storageClass unset to use the cluster's default StorageClass
      # storageClass: ""
