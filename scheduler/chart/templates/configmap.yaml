apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "scheduler.fullname" . }}
  labels:
    {{- include "scheduler.labels" . | nindent 4 }}
data:
  config.yaml: |
    http_port: {{ .Values.config.http_port | default 8080 }}
    log_level: {{ .Values.config.log_level | default "info" | quote }}
    database_url: {{ include "scheduler.databaseUrl" . | quote }}
    reconcile_interval: {{ .Values.config.reconcile_interval | default "30s" | quote }}
    cluster_timeout: {{ .Values.config.cluster_timeout | default "10s" | quote }}
    shutdown_timeout: {{ .Values.config.shutdown_timeout | default "30s" | quote }}
