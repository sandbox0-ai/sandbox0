# Example: Single-cluster minimal mode (internal-gateway + manager)
apiVersion: v1
kind: Namespace
metadata:
  name: sandbox0-system
---
apiVersion: infra.sandbox0.ai/v1alpha1
kind: Sandbox0Infra
metadata:
  name: minimal
  namespace: sandbox0-system
spec:
  version: "latest"
  database:
    # Use builtin for quick start; switch to external for managed PG.
    type: builtin
    builtin:
      enabled: true
      persistence:
        enabled: true
        size: "20Gi"
  # Example external database:
  # database:
  #   type: external
  #   external:
  #     host: your-db.rds.amazonaws.com
  #     port: 5432
  #     database: sandbox0
  #     username: sandbox0
  #     passwordSecret:
  #       name: db-credentials
  #       key: password
  services:
    internalGateway:
      enabled: true
      replicas: 1
      config:
        authMode: public
    manager:
      enabled: true
      replicas: 1
      config:
        builtin_templates:
          - template_id: default
            image: sandbox0ai/otemplates:default-v0.1.0
            display_name: Default
            pool:
              minIdle: 1
              maxIdle: 5
              autoScale: true
  initUser:
    enabled: true
    email: "admin@example.com"
    passwordSecret:
      name: admin-password
      key: password
