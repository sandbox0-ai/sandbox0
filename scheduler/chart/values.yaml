affinity: {}
config:
    database_url: postgres://sandbox0:sandbox0@postgresql:5432/sandbox0?sslmode=disable
    http_port: 8080
    log_level: info
    reconcile_interval: 30s
    shutdown_timeout: 30s
fullnameOverride: ""
image:
    pullPolicy: IfNotPresent
    repository: sandbox0ai/infra
    tag: ""
imagePullSecrets: []
livenessProbe:
    httpGet:
        path: /healthz
        port: http
    initialDelaySeconds: 10
    periodSeconds: 10
nameOverride: ""
nodeSelector: {}
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
readinessProbe:
    httpGet:
        path: /readyz
        port: http
    initialDelaySeconds: 5
    periodSeconds: 5
replicaCount: 1
resources:
    limits:
        cpu: 500m
        memory: 512Mi
    requests:
        cpu: 200m
        memory: 256Mi
secrets:
    internalJwtPrivateKeyKey: ""
    internalJwtPublicKeyKey: ""
    internalJwtSecretName: ""
securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
service:
    port: 8080
    type: ClusterIP
serviceAccount:
    annotations: {}
    automount: true
    create: true
    name: ""
tolerations: []
