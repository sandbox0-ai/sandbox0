name: SDK E2E

on:
  workflow_dispatch:
    inputs:
      sdk_repo:
        description: "SDK repository to test (owner/repo)"
        required: true
        default: "sandbox0-ai/sdk-go"
      sdk_ref:
        description: "SDK git ref (branch, tag, or SHA)"
        required: true
        default: "main"
      sdk_test_cmd:
        description: "SDK test command"
        required: true
        default: "go test -tags=e2e ./..."
      infra_manifest:
        description: "Infra scenario manifest (relative to repo root)"
        required: true
        default: "infra-operator/chart/samples/single-cluster/minimal.yaml"
      infra_name:
        description: "Sandbox0Infra name from manifest"
        required: true
        default: "minimal"
      infra_namespace:
        description: "Infra namespace"
        required: true
        default: "sandbox0-system"
      trace_id:
        description: "Unique ID to track this run"
        required: false
        default: ""
  workflow_call:
    inputs:
      sdk_repo:
        type: string
        required: true
      sdk_ref:
        type: string
        required: true
      sdk_test_cmd:
        type: string
        required: true
      infra_manifest:
        type: string
        required: true
      infra_name:
        type: string
        required: true
      infra_namespace:
        type: string
        required: true

jobs:
  sdk-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      KIND_CLUSTER_NAME: sandbox0-sdk-e2e
      INFRA_MANIFEST: ${{ inputs.infra_manifest }}
      INFRA_NAME: ${{ inputs.infra_name }}
      INFRA_NAMESPACE: ${{ inputs.infra_namespace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Cache local build outputs
        uses: actions/cache@v4
        with:
          path: |
            bin
          key: infra-bin-${{ runner.os }}-${{ hashFiles('go.sum', '**/*.go', 'Makefile') }}
          restore-keys: |
            infra-bin-${{ runner.os }}-

      - uses: helm/kind-action@v1
        with:
          version: v0.30.0
          config: tests/e2e/kind-config.yaml
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Setup protoc
        uses: arduino/setup-protoc@v3

      - name: Cache infra image tar
        uses: actions/cache@v4
        with:
          path: /tmp/infra-image.tar
          key: infra-image-${{ runner.os }}-${{ hashFiles('go.sum', '**/*.go', 'Dockerfile.local', 'Makefile') }}
          restore-keys: |
            infra-image-${{ runner.os }}-

      - name: Build or load Docker image (local binaries)
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          if [ -f /tmp/infra-image.tar ]; then
            echo "Loading cached infra image..."
            docker load -i /tmp/infra-image.tar
          else
            echo "Building infra image..."
            make docker-build-local
            docker save -o /tmp/infra-image.tar sandbox0ai/infra:latest
          fi

      - name: Cache dependency images
        uses: actions/cache@v4
        with:
          path: /tmp/infra-deps.tar
          key: infra-deps-${{ runner.os }}-postgres16-rustfs-1.0.0-alpha.79-registry-2.8.3

      - name: Pull or load dependency images
        run: |
          if [ -f /tmp/infra-deps.tar ]; then
            echo "Loading cached dependency images..."
            docker load -i /tmp/infra-deps.tar
          else
            echo "Pulling dependency images..."
            docker pull postgres:16-alpine
            docker pull rustfs/rustfs:1.0.0-alpha.79
            docker pull registry:2.8.3
            docker save -o /tmp/infra-deps.tar postgres:16-alpine rustfs/rustfs:1.0.0-alpha.79 registry:2.8.3
          fi

      - name: Load Image to Kind
        run: kind load docker-image sandbox0ai/infra:latest --name ${{ env.KIND_CLUSTER_NAME }}

      - name: Load dependency images to Kind
        run: |
          kind load docker-image postgres:16-alpine --name ${{ env.KIND_CLUSTER_NAME }}
          kind load docker-image rustfs/rustfs:1.0.0-alpha.79 --name ${{ env.KIND_CLUSTER_NAME }}
          kind load docker-image registry:2.8.3 --name ${{ env.KIND_CLUSTER_NAME }}

      - name: Install infra-operator
        run: |
          helm upgrade --install infra-operator infra-operator/chart \
            --namespace infra-operator --create-namespace \
            --set config.imagePullPolicy=IfNotPresent

      - name: Apply infra manifest
        run: kubectl apply -f "${INFRA_MANIFEST}"

      - name: Wait for Sandbox0Infra ready
        run: |
          if kubectl -n "${INFRA_NAMESPACE}" wait --for=condition=Ready "sandbox0infra/${INFRA_NAME}" --timeout=12m; then
            exit 0
          fi
          echo "Sandbox0Infra not ready"
          echo "=== sandbox0infra ==="
          kubectl -n "${INFRA_NAMESPACE}" get sandbox0infra "${INFRA_NAME}" -o yaml || true
          echo "=== infra-operator pods ==="
          kubectl -n infra-operator get pods -o wide || true
          echo "=== infra namespace pods ==="
          kubectl -n "${INFRA_NAMESPACE}" get pods -o wide || true
          echo "=== infra namespace services ==="
          kubectl -n "${INFRA_NAMESPACE}" get svc -o wide || true
          echo "=== infra namespace events ==="
          kubectl -n "${INFRA_NAMESPACE}" get events --sort-by=.lastTimestamp || true
          exit 1

      - name: Start API port-forward
        run: |
          service_name="${INFRA_NAME}-internal-gateway"
          service_port=$(kubectl -n "${INFRA_NAMESPACE}" get svc "${service_name}" -o jsonpath='{.spec.ports[0].port}')
          kubectl -n "${INFRA_NAMESPACE}" port-forward "svc/${service_name}" 18080:"${service_port}" >/tmp/port-forward.log 2>&1 &
          sleep 3
          echo "S0_E2E_BASE_URL=http://127.0.0.1:18080" >> "$GITHUB_ENV"

      - name: Export admin credentials
        run: |
          password=$(kubectl -n "${INFRA_NAMESPACE}" get secret admin-password -o jsonpath='{.data.password}' | base64 -d)
          echo "::add-mask::${password}"
          echo "S0_E2E_EMAIL=admin@example.com" >> "$GITHUB_ENV"
          echo "S0_E2E_PASSWORD=${password}" >> "$GITHUB_ENV"

      - name: Checkout SDK
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.sdk_repo }}
          ref: ${{ inputs.sdk_ref }}
          path: sdk

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: sdk/go.sum

      - name: Run SDK tests
        working-directory: sdk
        run: ${{ inputs.sdk_test_cmd }}

      - name: Cleanup infra
        if: always()
        run: |
          kubectl delete -f "${INFRA_MANIFEST}" --ignore-not-found=true
          helm uninstall infra-operator --namespace infra-operator || true
          kind delete cluster --name "${KIND_CLUSTER_NAME}" || true
