{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "netd.fullname" . }}
  labels:
    {{- include "netd.labels" . | nindent 4 }}
rules:
  # Watch pods to apply network policies (policies are stored in pod annotations)
  - apiGroups: [""]
    resources:
      - pods
    verbs: ["get", "list", "watch"]
  # Watch nodes for node-specific configuration
  - apiGroups: [""]
    resources:
      - nodes
    verbs: ["get", "list", "watch"]
  # Create events for policy enforcement logging
  - apiGroups: [""]
    resources:
      - events
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "netd.fullname" . }}
  labels:
    {{- include "netd.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "netd.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "netd.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
