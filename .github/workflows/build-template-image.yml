name: Build Template Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Template image tag (e.g. default-v0.1.0)"
        required: true
        default: "default-v0.1.0"
      dockerfile:
        description: "Dockerfile path relative to repo root"
        required: true
        default: "manager/procd/Dockerfile.default"

env:
  IMAGE_REPO: sandbox0ai/otemplates

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push template image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ${{ env.IMAGE_REPO }}:${{ inputs.version }}-${{ matrix.arch }}
          provenance: false

  manifest:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker buildx imagetools create -t $IMAGE_REPO:${{ inputs.version }} \
            $IMAGE_REPO:${{ inputs.version }}-amd64 \
            $IMAGE_REPO:${{ inputs.version }}-arm64

      - name: Print published image
        run: |
          echo "Published multi-arch image: ${IMAGE_REPO}:${{ inputs.version }}"
          echo "Dockerfile: ${{ inputs.dockerfile }}"
          echo "Platforms: linux/amd64, linux/arm64"
