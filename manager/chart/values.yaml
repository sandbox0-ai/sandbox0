affinity: {}
config:
    cleanup_interval: 1m0s
    database_url: ""
    default_cluster_id: default
    default_sandbox_ttl: 5m0s
    default_template_image: sandbox0ai/otemplates:default-v0.1.0
    default_template_name: default
    default_template_namespace: sandbox0
    http_port: 8080
    kube_config: ""
    leader_election: true
    log_level: info
    manager_image: sandbox0ai/infra:latest
    metrics_port: 9090
    procd_config:
        cache_max_bytes: 104857600
        cache_ttl: 30s
        http_port: 49983
        log_level: info
        node_name: ""
        root_path: /workspace
        sandbox_id: ""
        storage_proxy_base_url: storage-proxy.sandbox0-system.svc.cluster.local
        storage_proxy_replicas: 3
        template_id: ""
    resync_period: 30s
    webhook_cert_path: /tmp/k8s-webhook-server/serving-certs/tls.crt
    webhook_key_path: /tmp/k8s-webhook-server/serving-certs/tls.key
    webhook_port: 9443
crds:
    install: true
fullnameOverride: ""
image:
    pullPolicy: IfNotPresent
    repository: sandbox0ai/infra
    tag: ""
imagePullSecrets: []
livenessProbe:
    httpGet:
        path: /health
        port: http
    initialDelaySeconds: 10
    periodSeconds: 10
metricsService:
    port: 9090
    type: ClusterIP
nameOverride: ""
nodeSelector: {}
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
rbac:
    create: true
readinessProbe:
    httpGet:
        path: /health
        port: http
    initialDelaySeconds: 5
    periodSeconds: 5
replicaCount: 1
resources:
    limits:
        cpu: 500m
        memory: 512Mi
    requests:
        cpu: 100m
        memory: 256Mi
sandboxNamespace:
    create: true
secrets:
    internalJwtPrivateKeyKey: ""
    internalJwtPublicKeyKey: ""
    internalJwtSecretName: ""
securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
service:
    port: 8080
    type: ClusterIP
serviceAccount:
    annotations: {}
    automount: true
    create: true
    name: ""
tolerations: []
webhook:
    certManager:
        enabled: false
    enabled: true
    tls:
        certSecretName: ""
webhookService:
    port: 9443
    type: ClusterIP
