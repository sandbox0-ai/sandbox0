apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: netd
  namespace: sandbox0-system
  labels:
    app: netd
    app.kubernetes.io/name: netd
    app.kubernetes.io/component: network-dataplane
spec:
  selector:
    matchLabels:
      app: netd
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: netd
        app.kubernetes.io/name: netd
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: netd
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
      priorityClassName: system-node-critical
      containers:
        - name: netd
          image: sandbox0/netd:latest
          imagePullPolicy: IfNotPresent
          args:
            - --log-level=$(LOG_LEVEL)
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: LOG_LEVEL
              value: "info"
            - name: METRICS_PORT
              value: "9090"
            - name: HEALTH_PORT
              value: "8080"
            - name: PROXY_HTTP_PORT
              value: "18080"
            - name: PROXY_HTTPS_PORT
              value: "18443"
            - name: FAIL_CLOSED
              value: "true"
            - name: METRICS_REPORT_INTERVAL
              value: "10s"
            # Platform infrastructure CIDRs (configure per cluster)
            - name: STORAGE_PROXY_CIDR
              valueFrom:
                configMapKeyRef:
                  name: netd-config
                  key: storage-proxy-cidr
                  optional: true
            - name: CLUSTER_DNS_CIDR
              valueFrom:
                configMapKeyRef:
                  name: netd-config
                  key: cluster-dns-cidr
                  optional: true
            - name: INTERNAL_GATEWAY_CIDR
              valueFrom:
                configMapKeyRef:
                  name: netd-config
                  key: internal-gateway-cidr
                  optional: true
          ports:
            - name: metrics
              containerPort: 9090
              hostPort: 9090
              protocol: TCP
            - name: health
              containerPort: 8080
              hostPort: 8080
              protocol: TCP
            - name: proxy-http
              containerPort: 18080
              hostPort: 18080
              protocol: TCP
            - name: proxy-https
              containerPort: 18443
              hostPort: 18443
              protocol: TCP
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - SYS_ADMIN
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: xtables-lock
              mountPath: /run/xtables.lock
              readOnly: false
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
      volumes:
        - name: xtables-lock
          hostPath:
            path: /run/xtables.lock
            type: FileOrCreate
        - name: lib-modules
          hostPath:
            path: /lib/modules
            type: Directory

