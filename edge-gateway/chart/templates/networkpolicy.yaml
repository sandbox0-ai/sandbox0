apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "edge-gateway.fullname" . }}
  labels:
    {{- include "edge-gateway.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "edge-gateway.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
  # Allow traffic from within the namespace (for health checks)
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
  # Allow traffic to internal-gateway
  - to:
    - podSelector:
        matchLabels:
          app: internal-gateway
    ports:
    - protocol: TCP
      port: 8443
  # Allow traffic to PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
