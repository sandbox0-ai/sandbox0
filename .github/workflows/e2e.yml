name: E2E

on:
  workflow_dispatch:

jobs:
  e2e:
    name: E2E (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm64
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Prepare infra environment
        uses: ./.github/actions/prepare-infra
        with:
          infra-dir: infra
          kind-config: infra/tests/e2e/kind-config.yaml
          kind-cluster-name: sandbox0-e2e-${{ matrix.arch }}
          cache-key-suffix: ${{ matrix.arch }}

      - name: Run E2E
        working-directory: infra
        env:
          E2E_USE_EXISTING_CLUSTER: "true"
          E2E_CLUSTER_NAME: sandbox0-e2e-${{ matrix.arch }}
        run: make test-e2e
