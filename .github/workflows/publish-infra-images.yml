name: Publish Infra Images

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      image_repo:
        required: false
        type: string
        default: sandbox0ai/infra
      publish_latest:
        required: false
        type: boolean
        default: false

env:
  IMAGE_REPO: ${{ inputs.image_repo }}

jobs:
  publish-image:
    name: Publish infra image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free runner space
        uses: ./.github/actions/free-runner-space

      - name: Restore shared infra build cache
        id: infra-build-cache
        uses: ./.github/actions/restore-infra-build-cache
        with:
          cache-key-suffix: ${{ matrix.arch }}

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build local binaries
        run: make build-local-all

      - name: Save shared infra build cache
        uses: ./.github/actions/save-infra-build-cache
        with:
          cache-key-suffix: ${{ matrix.arch }}
          cache-hit: ${{ steps.infra-build-cache.outputs.cache-hit }}

      - name: Determine arch image tag
        id: docker_tag
        run: |
          VERSION="${{ inputs.version }}"
          echo "tag=${IMAGE_REPO}:${VERSION}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Build arch image with Dockerfile.local
        env:
          TAG: ${{ steps.docker_tag.outputs.tag }}
        run: docker build -t "${TAG}" -f Dockerfile.local .

      - name: Push arch image
        env:
          TAG: ${{ steps.docker_tag.outputs.tag }}
        run: docker push "${TAG}"

  publish-image-manifest:
    name: Publish infra image manifest
    runs-on: ubuntu-latest
    needs:
      - publish-image
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish multi-arch manifest
        run: |
          VERSION="${{ inputs.version }}"
          AMD64_IMAGE="${IMAGE_REPO}:${VERSION}-amd64"
          ARM64_IMAGE="${IMAGE_REPO}:${VERSION}-arm64"

          docker buildx imagetools create \
            -t "${IMAGE_REPO}:${VERSION}" \
            "${AMD64_IMAGE}" \
            "${ARM64_IMAGE}"

          if [[ "${{ inputs.publish_latest }}" == "true" ]]; then
            docker buildx imagetools create \
              -t "${IMAGE_REPO}:latest" \
              "${AMD64_IMAGE}" \
              "${ARM64_IMAGE}"
          fi
