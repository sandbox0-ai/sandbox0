# Example: Single-cluster network policy mode (netd)
apiVersion: v1
kind: Namespace
metadata:
  name: sandbox0-system
---
apiVersion: infra.sandbox0.ai/v1alpha1
kind: Sandbox0Infra
metadata:
  name: network-policy
  namespace: sandbox0-system
spec:
  version: "latest"
  database:
    # Use builtin for quick start; switch to external for managed PG.
    type: builtin
    builtin:
      enabled: true
      persistence:
        enabled: true
        size: "20Gi"
  # Example external database:
  # database:
  #   type: external
  #   external:
  #     host: your-db.rds.amazonaws.com
  #     port: 5432
  #     database: sandbox0
  #     username: sandbox0
  #     passwordSecret:
  #       name: db-credentials
  #       key: password
  publicExposure:
    enabled: true
    rootDomain: sandbox0.app
    regionId: aws-us-east-1
  builtinTemplates:
    - templateId: default
      image: sandbox0ai/otemplates:default-v0.1.0
      displayName: Default
      description: Builtin template installed by infra-operator.
      pool:
        minIdle: 1
        maxIdle: 5
        autoScale: true
  services:
    internalGateway:
      enabled: true
      replicas: 1
      config:
        authMode: public
    netd:
      enabled: true
    manager:
      enabled: true
      replicas: 1
  initUser:
    email: "admin@example.com"
    # passwordSecret:
    #   name: admin-password
    #   key: password
