kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: sandbox0-e2e
nodes:
- role: control-plane
  image: kindest/node:v1.35.0
  kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        enable-aggregator-routing: "true"
  extraPortMappings:
  - containerPort: 30080
    hostPort: 30080
- role: worker
  image: kindest/node:v1.35.0
  extraMounts:
  - containerPath: /var/run/docker.sock
    hostPath: /var/run/docker.sock
- role: worker
  image: kindest/node:v1.35.0
  extraMounts:
  - containerPath: /var/run/docker.sock
    hostPath: /var/run/docker.sock
