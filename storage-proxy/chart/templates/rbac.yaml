apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "storage-proxy.fullname" . }}
  labels:
    {{- include "storage-proxy.labels" . | nindent 4 }}
rules:
# Add any Kubernetes API permissions needed
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "storage-proxy.fullname" . }}
  labels:
    {{- include "storage-proxy.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "storage-proxy.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "storage-proxy.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
