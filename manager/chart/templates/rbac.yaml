{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "manager.fullname" . }}
  labels:
    {{- include "manager.labels" . | nindent 4 }}
rules:
  # Sandbox CRDs (network/bandwidth policies are now stored in pod annotations)
  - apiGroups: ["sandbox0.ai"]
    resources:
      - sandboxtemplates
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["sandbox0.ai"]
    resources:
      - sandboxtemplates/status
    verbs: ["get", "update", "patch"]
  # Core resources
  - apiGroups: [""]
    resources:
      - pods
      - pods/exec
      - services
      - configmaps
      - secrets
      - persistentvolumeclaims
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources:
      - pods/status
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources:
      - events
    verbs: ["create", "patch"]
  # Apps resources
  - apiGroups: ["apps"]
    resources:
      - replicasets
      - deployments
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Coordination for leader election
  - apiGroups: ["coordination.k8s.io"]
    resources:
      - leases
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Admission webhook
  - apiGroups: ["admissionregistration.k8s.io"]
    resources:
      - validatingwebhookconfigurations
      - mutatingwebhookconfigurations
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "manager.fullname" . }}
  labels:
    {{- include "manager.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "manager.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "manager.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
