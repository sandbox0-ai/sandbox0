apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sandbox0-system

resources:
- deployment.yaml
- secret.yaml
- networkpolicy.yaml
- ingress.yaml

commonLabels:
  app.kubernetes.io/name: edge-gateway
  app.kubernetes.io/component: gateway
  app.kubernetes.io/part-of: sandbox0

images:
- name: sandbox0/edge-gateway
  newTag: latest
