# Default values for scheduler

replicaCount: 1

image:
  repository: sandbox0ai/scheduler
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

nodeSelector: {}
tolerations: []
affinity: {}

# Secrets - only for file-based secrets (keys, certs)
# Uses global.jwt.internalJwtSecretName by default
secrets:
  internalJwtSecretName: ""  # defaults to {{ .Values.global.jwt.internalJwtSecretName }}
  internalJwtPrivateKeyKey: ""  # defaults to {{ .Values.global.jwt.privateKeyKey }}
  internalJwtPublicKeyKey: ""  # defaults to {{ .Values.global.jwt.publicKeyKey }}

# Application config - directly maps to config.yaml (snake_case)
config:
  http_port: 8080
  log_level: "info"
  
  # Database - uses global values by default
  # Override: set this to a specific value to override global.database.url
  database_url: ""  # defaults to {{ .Values.global.database.url }}
  
  # Reconciler
  reconcile_interval: "30s"
  
  # Timeouts
  cluster_timeout: "10s"
  shutdown_timeout: "30s"
