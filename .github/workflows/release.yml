name: Release

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE_REPO: sandbox0ai/infra
  HELM_REPO_URL: https://charts.sandbox0.ai
  HELM_REPO_DOMAIN: charts.sandbox0.ai

permissions:
  actions: read
  contents: write
  packages: write
  id-token: write

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      is_prerelease: ${{ steps.version.outputs.IS_PRERELEASE }}
    steps:
      - name: Extract and validate version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must be in the form vMAJOR.MINOR.PATCH[-PRERELEASE], got: ${GITHUB_REF_NAME}"
            exit 1
          fi

          if [[ "$VERSION" == *-* ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_OUTPUT"
          fi

  package:
    name: Package release assets
    needs: prepare-release
    uses: ./.github/workflows/release-package.yml
    with:
      version: ${{ needs.prepare-release.outputs.version }}
      upload_artifacts: true

  publish-images:
    name: Publish infra images
    needs:
      - prepare-release
      - package
      - trigger-cloud-website-release
    uses: ./.github/workflows/publish-infra-images.yml
    with:
      version: ${{ needs.prepare-release.outputs.version }}
      publish_latest: ${{ needs.prepare-release.outputs.is_prerelease != 'true' }}
    secrets: inherit

  publish-helm:
    name: Publish infra-operator Helm chart
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - package
      - publish-images
      - trigger-cloud-website-release
    steps:
      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Download Helm chart artifact
        uses: actions/download-artifact@v4
        with:
          name: infra-operator-chart-${{ needs.prepare-release.outputs.version }}
          path: .cr-release-packages
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ needs.package.outputs.artifact_run_id }}

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Publish chart to GitHub Packages (GHCR OCI)
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          OWNER_LOWER="${GITHUB_REPOSITORY_OWNER,,}"
          helm push ".cr-release-packages/infra-operator-${VERSION}.tgz" "oci://ghcr.io/${OWNER_LOWER}/charts"

      - name: Ensure gh-pages branch exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          remote_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git ls-remote --exit-code --heads "${remote_url}" gh-pages >/dev/null 2>&1; then
            exit 0
          fi

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT

          pushd "${tmp_dir}"
          git init -b gh-pages
          touch .nojekyll
          printf '%s\n' "${HELM_REPO_DOMAIN}" > CNAME
          cat > index.yaml <<'EOF'
          apiVersion: v1
          entries: {}
          EOF
          git add .nojekyll CNAME index.yaml
          git \
            -c user.name='github-actions[bot]' \
            -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
            commit -m 'Initialize gh-pages branch'
          git remote add origin "${remote_url}"
          git push origin gh-pages
          popd

      - name: Publish chart to Helm repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          CHART_PACKAGE=".cr-release-packages/infra-operator-${VERSION}.tgz"
          PAGES_URL="${HELM_REPO_URL}"
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT

          git clone --branch gh-pages --single-branch \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "${tmp_dir}/gh-pages"

          cp "${CHART_PACKAGE}" "${tmp_dir}/gh-pages/"
          touch "${tmp_dir}/gh-pages/.nojekyll"
          printf '%s\n' "${HELM_REPO_DOMAIN}" > "${tmp_dir}/gh-pages/CNAME"

          if [[ -f "${tmp_dir}/gh-pages/index.yaml" ]]; then
            helm repo index "${tmp_dir}/gh-pages" \
              --url "${PAGES_URL}" \
              --merge "${tmp_dir}/gh-pages/index.yaml"
          else
            helm repo index "${tmp_dir}/gh-pages" --url "${PAGES_URL}"
          fi

          pushd "${tmp_dir}/gh-pages"
          if git diff --quiet --exit-code -- .; then
            echo "Helm repo already up to date"
            exit 0
          fi

          git add .nojekyll CNAME index.yaml "infra-operator-${VERSION}.tgz"
          git \
            -c user.name='github-actions[bot]' \
            -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
            commit -m "Publish infra-operator chart ${VERSION}"
          git push origin gh-pages
          popd

  create-draft-release:
    name: Create or update draft GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - package
    steps:
      - name: Create or update draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          OWNER_LOWER="${GITHUB_REPOSITORY_OWNER,,}"
          NOTES=$(cat <<EOF
          Automated release for ${TAG}.

          Published artifacts:
          - Docker image: docker.io/${IMAGE_REPO}:${{ needs.prepare-release.outputs.version }}
          - Helm OCI: oci://ghcr.io/${OWNER_LOWER}/charts/infra-operator
          - Helm repo: https://sandbox0-ai.github.io/sandbox0
          - Website/docs build and Pages deploy are handled by sandbox0-cloud
          EOF
          )

          if gh release view "${TAG}" >/dev/null 2>&1; then
            IS_DRAFT=$(gh release view "${TAG}" --json isDraft --jq '.isDraft')
            IS_IMMUTABLE=$(gh release view "${TAG}" --json isImmutable --jq '.isImmutable')
            if [[ "${IS_IMMUTABLE}" == "true" ]]; then
              echo "Release ${TAG} already exists and is immutable. Delete the release before rerunning this workflow for the same tag."
              exit 1
            fi

            if [[ "${IS_DRAFT}" != "true" ]]; then
              echo "Release ${TAG} already exists and is published. This workflow requires a draft release so sandbox0-cloud can upload docs before publication."
              exit 1
            fi

            gh release edit "${TAG}" --title "${TAG}" --notes "${NOTES}"
          else
            args=(--draft --title "${TAG}" --notes "${NOTES}")
            if [[ "${{ needs.prepare-release.outputs.is_prerelease }}" == "true" ]]; then
              args+=(--prerelease)
            fi
            gh release create "${TAG}" "${args[@]}"
          fi

  trigger-cloud-website-release:
    name: Trigger sandbox0-cloud website deploy
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - package
      - create-draft-release
    steps:
      - name: Dispatch website deploy to sandbox0-cloud
        id: dispatch
        env:
          SANDBOX0_CLOUD_REPO_TOKEN: ${{ secrets.SANDBOX0_CLOUD_REPO_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${SANDBOX0_CLOUD_REPO_TOKEN}" ]]; then
            echo "SANDBOX0_CLOUD_REPO_TOKEN is required to dispatch the sandbox0-cloud website workflow."
            exit 1
          fi

          dispatch_time="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          GH_TOKEN="${SANDBOX0_CLOUD_REPO_TOKEN}" gh workflow run website.yml \
            --repo sandbox0-ai/sandbox0-cloud \
            --ref main \
            -f sandbox0_repository="${GITHUB_REPOSITORY}" \
            -f sandbox0_ref="${GITHUB_REF_NAME}" \
            -f docs_github_repository="${GITHUB_REPOSITORY}" \
            -f docs_include_next="true" \
            -f docs_download_release_bundles="1" \
            -f upload_release_bundle="true" \
            -f release_tag="${GITHUB_REF_NAME}" \
            -f deploy_to_pages="true"

          echo "dispatch_time=${dispatch_time}" >> "$GITHUB_OUTPUT"
          echo "Dispatched sandbox0-cloud website release workflow for ${GITHUB_REF_NAME}."

      - name: Wait for website deploy workflow
        env:
          GH_TOKEN: ${{ secrets.SANDBOX0_CLOUD_REPO_TOKEN }}
          DISPATCH_TIME: ${{ steps.dispatch.outputs.dispatch_time }}
        run: |
          set -euo pipefail

          run_id=""
          for attempt in $(seq 1 30); do
            run_id="$(
              gh api "repos/sandbox0-ai/sandbox0-cloud/actions/workflows/website.yml/runs?event=workflow_dispatch&branch=main&per_page=20" \
                | python3 -c 'import json, os, sys; from datetime import datetime; dispatch_time = datetime.fromisoformat(os.environ["DISPATCH_TIME"].replace("Z", "+00:00")); data = json.load(sys.stdin); print(next((str(run["id"]) for run in data.get("workflow_runs", []) if datetime.fromisoformat(run["created_at"].replace("Z", "+00:00")) >= dispatch_time), ""))'
            )"

            if [[ -n "${run_id}" ]]; then
              break
            fi

            sleep 60
          done

          if [[ -z "${run_id}" ]]; then
            echo "Timed out waiting for sandbox0-cloud website workflow to start."
            exit 1
          fi

          gh run watch "${run_id}" --repo sandbox0-ai/sandbox0-cloud --interval 60 --exit-status

  publish-release-record:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - package
      - publish-images
      - publish-helm
      - trigger-cloud-website-release
    steps:
      - name: Publish draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} does not exist."
            exit 1
          fi

          IS_DRAFT=$(gh release view "${TAG}" --json isDraft --jq '.isDraft')
          IS_IMMUTABLE=$(gh release view "${TAG}" --json isImmutable --jq '.isImmutable')

          if [[ "${IS_DRAFT}" != "true" ]]; then
            if [[ "${IS_IMMUTABLE}" == "true" ]]; then
              echo "Release ${TAG} is already published and immutable."
            else
              echo "Release ${TAG} is already published."
            fi
            exit 1
          fi

          gh release edit "${TAG}" --draft=false
