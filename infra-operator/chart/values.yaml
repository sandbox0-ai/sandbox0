replicaCount: 1

image:
  repository: sandbox0ai/infra
  pullPolicy: IfNotPresent
  # Leave empty so released charts follow Chart.appVersion by default.
  tag: ""

nameOverride: ""
fullnameOverride: "infra-operator"

serviceAccount:
  create: true
  annotations: {}
  name: "infra-operator"

podAnnotations: {}

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - "ALL"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 50m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

config:
  imagePullPolicy: ""
