name: SDK E2E

on:
  workflow_dispatch:
    inputs:
      sdk_repo:
        description: "SDK repository to test (owner/repo)"
        required: true
        default: "sandbox0-ai/sdk-go"
      sdk_ref:
        description: "SDK git ref (branch, tag, or SHA)"
        required: true
        default: "main"
      sdk_test_cmd:
        description: "SDK test command"
        required: true
        default: "go test -tags=e2e ./..."
      infra_manifest:
        description: "Infra scenario manifest (relative to repo root)"
        required: true
        default: "infra-operator/chart/samples/single-cluster/fullmode.yaml"
      infra_name:
        description: "Sandbox0Infra name from manifest"
        required: true
        default: "fullmode"
      infra_namespace:
        description: "Infra namespace"
        required: true
        default: "sandbox0-system"
      trace_id:
        description: "Unique ID to track this run"
        required: false
        default: ""
  workflow_call:
    inputs:
      sdk_repo:
        type: string
        required: true
      sdk_ref:
        type: string
        required: true
      sdk_test_cmd:
        type: string
        required: true
      infra_manifest:
        type: string
        required: true
      infra_name:
        type: string
        required: true
      infra_namespace:
        type: string
        required: true

jobs:
  sdk-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      KIND_CLUSTER_NAME: sandbox0-sdk-e2e
      INFRA_MANIFEST: ${{ inputs.infra_manifest }}
      INFRA_NAME: ${{ inputs.infra_name }}
      INFRA_NAMESPACE: ${{ inputs.infra_namespace }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare infra environment
        uses: ./.github/actions/prepare-infra
        with:
          kind-config: tests/e2e/kind-config.yaml
          kind-cluster-name: ${{ env.KIND_CLUSTER_NAME }}
          cache-key-suffix: amd64

      - name: Install infra-operator
        run: |
          helm upgrade --install infra-operator infra-operator/chart \
            --namespace infra-operator --create-namespace \
            --set config.imagePullPolicy=IfNotPresent

      - name: Apply infra manifest
        run: kubectl apply -f "${INFRA_MANIFEST}"

      - name: Wait for Sandbox0Infra ready
        run: |
          if kubectl -n "${INFRA_NAMESPACE}" wait --for=condition=Ready "sandbox0infra/${INFRA_NAME}" --timeout=9m; then
            exit 0
          fi
          echo "Sandbox0Infra not ready"
          echo "=== sandbox0infra ==="
          kubectl -n "${INFRA_NAMESPACE}" get sandbox0infra "${INFRA_NAME}" -o yaml || true
          echo "=== infra-operator pods ==="
          kubectl -n infra-operator get pods -o wide || true
          echo "=== infra namespace pods ==="
          kubectl -n "${INFRA_NAMESPACE}" get pods -o wide || true
          echo "=== infra namespace services ==="
          kubectl -n "${INFRA_NAMESPACE}" get svc -o wide || true
          echo "=== infra namespace events ==="
          kubectl -n "${INFRA_NAMESPACE}" get events --sort-by=.lastTimestamp || true
          exit 1

      - name: Set API base URL (NodePort)
        run: |
          service_name="${INFRA_NAME}-cluster-gateway"
          node_port=$(kubectl -n "${INFRA_NAMESPACE}" get svc "${service_name}" -o jsonpath='{.spec.ports[0].nodePort}')
          # For Kind with extraPortMappings, use localhost
          # For real clusters, set S0_E2E_NODE_IP to the node's reachable IP
          node_ip="${S0_E2E_NODE_IP:-127.0.0.1}"
          echo "S0_E2E_BASE_URL=http://${node_ip}:${node_port}" >> "$GITHUB_ENV"
          echo "Using API URL: http://${node_ip}:${node_port}"

      - name: Export admin credentials
        run: |
          password=$(kubectl -n "${INFRA_NAMESPACE}" get secret admin-password -o jsonpath='{.data.password}' | base64 -d)
          echo "::add-mask::${password}"
          echo "S0_E2E_EMAIL=admin@example.com" >> "$GITHUB_ENV"
          echo "S0_E2E_PASSWORD=${password}" >> "$GITHUB_ENV"

      - name: Checkout SDK
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.sdk_repo }}
          ref: ${{ inputs.sdk_ref }}
          path: sdk

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: sdk/go.sum

      - name: Run SDK tests
        working-directory: sdk
        run: ${{ inputs.sdk_test_cmd }}

      - name: Cleanup infra
        if: always()
        run: |
          kubectl delete -f "${INFRA_MANIFEST}" --ignore-not-found=true
          helm uninstall infra-operator --namespace infra-operator || true
          kind delete cluster --name "${KIND_CLUSTER_NAME}" || true
