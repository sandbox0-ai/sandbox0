apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "storage-proxy.fullname" . }}
  labels:
    {{- include "storage-proxy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "storage-proxy.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow gRPC traffic from procd pods
  - from:
    - namespaceSelector:
        matchLabels:
          name: sandbox0-workloads
    - podSelector:
        matchLabels:
          app: procd
    ports:
    - protocol: TCP
      port: {{ .Values.service.grpcPort }}
  
  # Allow HTTP management traffic from manager
  - from:
    - podSelector:
        matchLabels:
          app: manager
    ports:
    - protocol: TCP
      port: {{ .Values.service.httpPort }}
  
  # Allow metrics scraping from Prometheus
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: {{ .Values.service.metricsPort }}
  
  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    - podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  
  # Allow PostgreSQL (JuiceFS metadata)
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  
  # Allow S3 access (AWS)
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32  # Block EC2 metadata
    ports:
    - protocol: TCP
      port: 443
