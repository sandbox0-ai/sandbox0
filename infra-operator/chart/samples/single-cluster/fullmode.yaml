# Example: Single-cluster fullmode deployment
apiVersion: v1
kind: Namespace
metadata:
  name: sandbox0-system
---
apiVersion: infra.sandbox0.ai/v1alpha1
kind: Sandbox0Infra
metadata:
  name: fullmode
  namespace: sandbox0-system
spec:
  database:
    # Use builtin for quick start; switch to external for managed PG.
    type: builtin
    builtin:
      enabled: true
      persistence:
        size: "20Gi"
  # Example external database:
  # database:
  #   type: external
  #   external:
  #     host: your-db.rds.amazonaws.com
  #     port: 5432
  #     database: sandbox0
  #     username: sandbox0
  #     passwordSecret:
  #       name: db-credentials
  #       key: password
  # Optional licensed, ClickHouse-backed audit. durable_async is the default;
  # use canonical_sync when every audited admission must wait for ClickHouse.
  # enterpriseLicense:
  #   secretRef:
  #     name: fullmode-enterprise-license
  #     key: license.lic
  # clickHouse:
  #   type: builtin
  #   builtin:
  #     enabled: true
  #     persistence:
  #       size: "20Gi"
  # sandboxObservability:
  #   enabled: true
  #   backend: clickhouse
  #   audit:
  #     enabled: true
  #     deliveryMode: durable_async
  #     deliveryPersistence:
  #       size: "3Gi"
  #     spoolLimits:
  #       maxBytes: 1073741824
  #       maxEntries: 100000
  #       maxTeamBytes: 268435456
  #       maxTeamEntries: 25000
  #       minFreeBytes: 1073741824
  #       maxRecordBytes: 1048576
  publicExposure:
    enabled: true
    rootDomain: sandbox0.app
    regionId: aws-us-east-1
  storage:
    # Builtin storage is for quick start; use s3/oss for production scale.
    type: builtin
    builtin:
      enabled: true
      persistence:
        size: "20Gi"
    runtime:
      objectEncryptionEnabled: true
  # Example S3 storage:
  # storage:
  #   type: s3
  #   s3:
  #     bucket: sandbox0-prod
  #     region: us-east-1
  #     endpoint: https://s3.amazonaws.com
  #     credentialsSecret:
  #       name: aws-credentials
  #       accessKeyKey: accessKeyId
  #       secretKeyKey: secretAccessKey
  #   runtime:
  #     objectEncryptionEnabled: true
  # Builtin Redis backs distributed Team Quota rate and concurrency
  # enforcement, the public identity overload guard, and the independently
  # namespaced sandbox public-service abuse guard.
  redis:
    type: builtin
    builtin:
      enabled: true
  # Region-owned defaults protect shared capacity from a single team. In
  # fullmode, cluster-gateway owns policy reconciliation. Gateways, manager,
  # storage, ctld, SSH, and network consumers share the Redis enforcement
  # settings; durable capacity remains in the region PostgreSQL.
  teamQuota:
    # infra-operator generates status.teamQuota.stateId once for this owner.
    defaults:
      - key: sandbox_identity_count
        kind: capacity
        limit: 1000
      - key: sandbox_runtime_count
        kind: capacity
        limit: 100
      - key: sandbox_cpu_millicores
        kind: capacity
        limit: 100000
      - key: sandbox_memory_bytes
        kind: capacity
        limit: 274877906944
      - key: sandbox_ephemeral_storage_bytes
        kind: capacity
        limit: 1099511627776
      - key: volume_storage_bytes
        kind: capacity
        limit: 1099511627776
      - key: snapshot_storage_bytes
        kind: capacity
        limit: 1099511627776
      - key: rootfs_storage_bytes
        kind: capacity
        limit: 1099511627776
      - key: template_image_storage_bytes
        kind: capacity
        limit: 1099511627776
      - key: storage_object_count
        kind: capacity
        limit: 1000000
      - key: control_plane_object_count
        kind: capacity
        limit: 10000
      - key: active_connection_count
        kind: concurrency
        limit: 2000
      - key: active_request_count
        kind: concurrency
        limit: 500
      - key: api_requests
        kind: rate
        tokens: 1000
        interval: 1s
        burst: 2000
      - key: sandbox_service_requests
        kind: rate
        tokens: 1000
        interval: 1s
        burst: 2000
      - key: sandbox_starts
        kind: rate
        tokens: 100
        interval: 1s
        burst: 150
      - key: network_operations
        kind: rate
        tokens: 10000
        interval: 1s
        burst: 20000
      - key: network_ingress_bytes
        kind: rate
        tokens: 104857600
        interval: 1s
        burst: 209715200
      - key: network_egress_bytes
        kind: rate
        tokens: 104857600
        interval: 1s
        burst: 209715200
      - key: storage_operations
        kind: rate
        tokens: 1000
        interval: 1s
        burst: 2000
      - key: observability_ingest_bytes
        kind: rate
        tokens: 8388608
        interval: 1s
        burst: 16777216
    distributedEnforcement:
      policyCacheTtl: 5s
      leaseTtl: 15s
      renewInterval: 5s
  registry:
    # Builtin registry is for quick start; external registries use provider config.
    provider: builtin
    builtin:
      enabled: true
      service:
        type: NodePort
        port: 30500
      # The CLI pushes here and kind sandbox nodes pull generated template images here.
      pushEndpoint: 127.0.0.1:30500
      # ingress:
      #   enabled: true
      #   className: nginx
      #   host: registry.example.com
      #   tlsSecret: registry-tls
  # Example external AWS registry:
  # registry:
  #   provider: aws
  #   aws:
  #     region: us-east-1
  #     registryId: "123456789012"
  #     pullSecret:
  #       name: ecr-pull-secret
  #       key: .dockerconfigjson
  #     credentialsSecret:
  #       name: aws-credentials
  #       accessKeyKey: accessKeyId
  #       secretKeyKey: secretAccessKey
  builtinTemplates:
    - templateId: default
      image: sandbox0ai/otemplates:default-v0.2.0
      displayName: Default
      description: Builtin template installed by infra-operator.
      pool:
        minIdle: 1
        maxIdle: 5
    - templateId: openclaw
      image: ghcr.io/openclaw/openclaw:latest
      displayName: OpenClaw
      description: Builtin OpenClaw agent-in-sandbox template installed by infra-operator.
      pool:
        minIdle: 0
        maxIdle: 2
    - templateId: hermes
      image: nousresearch/hermes-agent:latest
      displayName: Hermes
      description: Builtin Hermes agent-in-sandbox template installed by infra-operator.
      pool:
        minIdle: 0
        maxIdle: 2
    - templateId: browser
      image: ghcr.io/steel-dev/steel-browser:latest
      displayName: Browser
      description: Builtin browser automation template installed by infra-operator.
      pool:
        minIdle: 0
        maxIdle: 2
    - templateId: coding-agent
      image: sandbox0ai/otemplates:coding-agent-v0.1.0
      displayName: Coding Agents
      description: Builtin coding-agent template with Codex, Claude Code, OpenCode, and Pi installed by infra-operator.
      pool:
        minIdle: 0
        maxIdle: 2
  # Shared placement for sandbox template Pods and the node-local ctld runtime.
  # infra-operator manages sandbox0.ai/data-plane-ready; do not include it here.
  #sandboxNodePlacement:
  #  nodeSelector:
  #    sandbox0.ai/node-role: sandbox
  #  tolerations:
  #    - key: sandbox0.ai/sandbox
  #      operator: Equal
  #      value: "true"
  #      effect: NoSchedule
  #    - key: sandbox.gke.io/runtime
  #      operator: Equal
  #      value: gvisor
  #      effect: NoSchedule
  network:
    # By default infra-operator manages a cluster-local MITM CA secret for HTTPS auth injection.
    # Set mitmCaSecretName only when you provide a secret containing ca.crt and ca.key.
    config:
      egressAuthEnabled: true
      egressAuthFailurePolicy: fail-closed
      proxyMaxActiveTcpConnections: 4096
      proxyUdpWorkers: 32
      proxyUdpQueueSize: 1024
  services:
    clusterGateway:
      enabled: true
      replicas: 1
      # service:
      #   type: ClusterIP
      #   port: 80
      service:
        type: NodePort
        port: 30080
      config:
        authMode: public
        overloadGuard:
          requestsPerSecond: 100
          burst: 200
          localRequestsPerSecond: 500
          localBurst: 1000
          maxInFlight: 512
    manager:
      enabled: true
      replicas: 1
  initUser:
    email: "admin@example.com"
