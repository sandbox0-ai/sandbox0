replicaCount: 3

image:
  repository: sandbox0/storage-proxy
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: "storage-proxy"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext: {}

service:
  type: ClusterIP
  grpcPort: 8080
  httpPort: 8081
  metricsPort: 9090

ingress:
  enabled: false

resources:
  requests:
    cpu: "2"
    memory: "4Gi"
  limits:
    cpu: "4"
    memory: "8Gi"

pdb:
  enabled: true
  minAvailable: 2

env:
  DEFAULT_S3_REGION: "us-east-1"
  DEFAULT_S3_ENDPOINT: ""
  DEFAULT_CACHE_SIZE: "10G"
  DEFAULT_CACHE_DIR: "/var/lib/storage-proxy/cache"
  GRPC_ADDR: "0.0.0.0"
  GRPC_PORT: "8080"
  HTTP_ADDR: "0.0.0.0"
  HTTP_PORT: "8081"
  METRICS_PORT: "9090"
  LOG_LEVEL: "info"
  AUDIT_LOG: "true"
  AUDIT_FILE: "/var/log/storage-proxy/audit.log"
  MAX_OPS_PER_SECOND: "10000"
  MAX_BYTES_PER_SECOND: "1073741824"

secrets:
  jwtSecret: "CHANGE_ME_IN_PRODUCTION_USE_LONG_RANDOM_STRING"
  postgresUrl: "postgres://juicefs:password@postgres:5432/juicefs?sslmode=disable"
  awsAccessKeyId: ""
  awsSecretAccessKey: ""

persistence:
  cache:
    enabled: true
    storageClassName: "fast-ssd"
    accessModes:
      - ReadWriteOnce
    size: 100Gi

volumeMounts:
  - name: cache
    mountPath: /var/lib/storage-proxy/cache
  - name: logs
    mountPath: /var/log/storage-proxy

volumes:
  - name: logs
    emptyDir: {}
