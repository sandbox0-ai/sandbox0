# Example: Local development mode (all components with builtin database/storage)
apiVersion: v1
kind: Namespace
metadata:
  name: sandbox0-system
---
apiVersion: infra.sandbox0.ai/v1alpha1
kind: Sandbox0Infra
metadata:
  name: sandbox0-dev
  namespace: sandbox0-system
spec:
  mode: all
  version: "latest"
  database:
    type: builtin
    builtin:
      enabled: true
      persistence:
        enabled: true
        size: "20Gi"
  storage:
    type: builtin
    builtin:
      enabled: true
      persistence:
        enabled: true
        size: "50Gi"
  services:
    edgeGateway:
      enabled: true
      replicas: 1
      service:
        type: NodePort
        port: 80
    scheduler:
      enabled: true
      replicas: 1
    internalGateway:
      enabled: true
      replicas: 1
    manager:
      enabled: true
      replicas: 1
      config:
        templateNamespace: sandbox0
        defaultTemplate:
          name: default
          image: sandbox0ai/otemplates:default-v0.1.0
          pool:
            minIdle: 1
            maxIdle: 5
            autoScale: true
    storageProxy:
      enabled: true
      replicas: 1
    netd:
      enabled: true
  initUser:
    enabled: true
    email: "admin@localhost"
    passwordSecret:
      name: admin-password
      key: password
