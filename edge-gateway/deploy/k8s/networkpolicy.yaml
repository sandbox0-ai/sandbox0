apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: edge-gateway
  namespace: sandbox0-system
spec:
  podSelector:
    matchLabels:
      app: edge-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080
  # Allow traffic from within the namespace (for health checks)
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 8080
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
  # Allow traffic to internal-gateway
  - to:
    - podSelector:
        matchLabels:
          app: internal-gateway
    ports:
    - protocol: TCP
      port: 8443
  # Allow traffic to PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
