# Example: Single-cluster fullmode deployment on GKE with gVisor sandbox nodes
apiVersion: v1
kind: Namespace
metadata:
  name: sandbox0-system
---
apiVersion: infra.sandbox0.ai/v1alpha1
kind: Sandbox0Infra
metadata:
  name: fullmode
  namespace: sandbox0-system
spec:
  database:
    type: builtin
    builtin:
      enabled: true
      persistence:
        size: "20Gi"
  publicExposure:
    enabled: true
    rootDomain: sandbox0.app
    regionId: gcp-us-east1
  storage:
    type: builtin
    builtin:
      enabled: true
      persistence:
        size: "20Gi"
    runtime:
      objectEncryptionEnabled: false
  # Redis is required by Team Quota rate and concurrency enforcement, the
  # public identity overload guard, and the separate sandbox public-service
  # abuse guard.
  redis:
    type: builtin
    builtin:
      enabled: true
  # Fullmode cluster-gateway owns this complete region default set.
  teamQuota:
    # infra-operator generates status.teamQuota.stateId once for this owner.
    defaults:
      - key: sandbox_identity_count
        kind: capacity
        limit: 1000
      - key: sandbox_runtime_count
        kind: capacity
        limit: 100
      - key: sandbox_cpu_millicores
        kind: capacity
        limit: 100000
      - key: sandbox_memory_bytes
        kind: capacity
        limit: 274877906944
      - key: sandbox_ephemeral_storage_bytes
        kind: capacity
        limit: 1099511627776
      - key: volume_storage_bytes
        kind: capacity
        limit: 1099511627776
      - key: snapshot_storage_bytes
        kind: capacity
        limit: 1099511627776
      - key: rootfs_storage_bytes
        kind: capacity
        limit: 1099511627776
      - key: template_image_storage_bytes
        kind: capacity
        limit: 1099511627776
      - key: storage_object_count
        kind: capacity
        limit: 1000000
      - key: control_plane_object_count
        kind: capacity
        limit: 10000
      - key: active_connection_count
        kind: concurrency
        limit: 2000
      - key: active_request_count
        kind: concurrency
        limit: 500
      - key: api_requests
        kind: rate
        tokens: 1000
        interval: 1s
        burst: 2000
      - key: sandbox_service_requests
        kind: rate
        tokens: 1000
        interval: 1s
        burst: 2000
      - key: sandbox_starts
        kind: rate
        tokens: 100
        interval: 1s
        burst: 150
      - key: network_operations
        kind: rate
        tokens: 10000
        interval: 1s
        burst: 20000
      - key: network_ingress_bytes
        kind: rate
        tokens: 104857600
        interval: 1s
        burst: 209715200
      - key: network_egress_bytes
        kind: rate
        tokens: 104857600
        interval: 1s
        burst: 209715200
      - key: storage_operations
        kind: rate
        tokens: 1000
        interval: 1s
        burst: 2000
      - key: observability_ingest_bytes
        kind: rate
        tokens: 8388608
        interval: 1s
        burst: 16777216
    distributedEnforcement:
      policyCacheTtl: 5s
      leaseTtl: 15s
      renewInterval: 5s
  registry:
    provider: builtin
    builtin:
      enabled: true
      service:
        type: NodePort
        port: 30500
      # Replace this with a TLS/LB address reachable by every sandbox node.
      pushEndpoint: 127.0.0.1:30500
  builtinTemplates:
    - templateId: default
      image: sandbox0ai/otemplates:default-v0.2.0
      displayName: Default
      description: Builtin template installed by infra-operator.
      pool:
        minIdle: 1
        maxIdle: 5
    - templateId: openclaw
      image: ghcr.io/openclaw/openclaw:latest
      displayName: OpenClaw
      description: Builtin OpenClaw agent-in-sandbox template installed by infra-operator.
      pool:
        minIdle: 0
        maxIdle: 2
    - templateId: hermes
      image: nousresearch/hermes-agent:latest
      displayName: Hermes
      description: Builtin Hermes agent-in-sandbox template installed by infra-operator.
      pool:
        minIdle: 0
        maxIdle: 2
    - templateId: browser
      image: ghcr.io/steel-dev/steel-browser:latest
      displayName: Browser
      description: Builtin browser automation template installed by infra-operator.
      pool:
        minIdle: 0
        maxIdle: 2
    - templateId: coding-agent
      image: sandbox0ai/otemplates:coding-agent-v0.1.0
      displayName: Coding Agents
      description: Builtin coding-agent template with Codex, Claude Code, OpenCode, and Pi installed by infra-operator.
      pool:
        minIdle: 0
        maxIdle: 2
  # Shared placement for sandbox template Pods and the node-local ctld runtime.
  sandboxNodePlacement:
    # Reuse the native GKE Sandbox node label so sandbox placement does not
    # depend on an extra custom node label.
    nodeSelector:
      sandbox.gke.io/runtime: gvisor
    tolerations:
      - key: sandbox0.ai/sandbox
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: sandbox.gke.io/runtime
        operator: Equal
        value: gvisor
        effect: NoSchedule
  network:
    config:
      egressAuthEnabled: true
      egressAuthFailurePolicy: fail-closed
      proxyMaxActiveTcpConnections: 4096
      proxyUdpWorkers: 32
      proxyUdpQueueSize: 1024
  services:
    clusterGateway:
      enabled: true
      replicas: 1
      service:
        type: NodePort
        port: 30080
      config:
        authMode: public
        overloadGuard:
          requestsPerSecond: 100
          burst: 200
          localRequestsPerSecond: 500
          localBurst: 1000
          maxInFlight: 512
    manager:
      enabled: true
      replicas: 1
      config:
        sandboxRuntimeClassName: gvisor
  initUser:
    email: "admin@example.com"
