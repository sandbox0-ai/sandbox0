name: Release

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE_REPO: sandbox0ai/infra
  HELM_REPO_URL: https://charts.sandbox0.ai
  HELM_REPO_DOMAIN: charts.sandbox0.ai

permissions:
  contents: write
  packages: write

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      is_prerelease: ${{ steps.version.outputs.IS_PRERELEASE }}
    steps:
      - name: Extract and validate version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must be in the form vMAJOR.MINOR.PATCH[-PRERELEASE], got: ${GITHUB_REF_NAME}"
            exit 1
          fi

          if [[ "$VERSION" == *-* ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_OUTPUT"
          fi

  publish-image:
    name: Publish infra image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free runner space
        uses: ./.github/actions/free-runner-space

      - name: Restore shared infra build cache
        id: infra-build-cache
        uses: ./.github/actions/restore-infra-build-cache
        with:
          cache-key-suffix: ${{ matrix.arch }}

      - name: Setup protoc
        uses: arduino/setup-protoc@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build local binaries
        run: make build-local-all

      - name: Save shared infra build cache
        uses: ./.github/actions/save-infra-build-cache
        with:
          cache-key-suffix: ${{ matrix.arch }}
          cache-hit: ${{ steps.infra-build-cache.outputs.cache-hit }}

      - name: Determine arch image tag
        id: docker_tag
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          echo "tag=${IMAGE_REPO}:${VERSION}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Build arch image with Dockerfile.local
        env:
          TAG: ${{ steps.docker_tag.outputs.tag }}
        run: docker build -t "${TAG}" -f Dockerfile.local .

      - name: Push arch image
        env:
          TAG: ${{ steps.docker_tag.outputs.tag }}
        run: docker push "${TAG}"

  publish-image-manifest:
    name: Publish infra image manifest
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - publish-image
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish multi-arch manifest
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          AMD64_IMAGE="${IMAGE_REPO}:${VERSION}-amd64"
          ARM64_IMAGE="${IMAGE_REPO}:${VERSION}-arm64"

          docker buildx imagetools create \
            -t "${IMAGE_REPO}:${VERSION}" \
            "${AMD64_IMAGE}" \
            "${ARM64_IMAGE}"

          if [[ "${{ needs.prepare-release.outputs.is_prerelease }}" != "true" ]]; then
            docker buildx imagetools create \
              -t "${IMAGE_REPO}:latest" \
              "${AMD64_IMAGE}" \
              "${ARM64_IMAGE}"
          fi

  publish-helm:
    name: Publish infra-operator Helm chart
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - publish-image-manifest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Update chart version
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          sed -E -i "s/^version:.*/version: ${VERSION}/" infra-operator/chart/Chart.yaml
          sed -E -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" infra-operator/chart/Chart.yaml

      - name: Lint chart
        run: helm lint infra-operator/chart

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Package Helm chart
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          helm package infra-operator/chart --destination .cr-release-packages
          test -f ".cr-release-packages/infra-operator-${VERSION}.tgz"

      - name: Publish chart to GitHub Packages (GHCR OCI)
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          OWNER_LOWER="${GITHUB_REPOSITORY_OWNER,,}"
          helm push ".cr-release-packages/infra-operator-${VERSION}.tgz" "oci://ghcr.io/${OWNER_LOWER}/charts"

      - name: Ensure gh-pages branch exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            exit 0
          fi

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT

          pushd "${tmp_dir}"
          git init -b gh-pages
          touch .nojekyll
          printf '%s\n' "${HELM_REPO_DOMAIN}" > CNAME
          cat > index.yaml <<'EOF'
          apiVersion: v1
          entries: {}
          EOF
          git add .nojekyll CNAME index.yaml
          git \
            -c user.name='github-actions[bot]' \
            -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
            commit -m 'Initialize gh-pages branch'
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin gh-pages
          popd

      - name: Publish chart to Helm repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          CHART_PACKAGE=".cr-release-packages/infra-operator-${VERSION}.tgz"
          PAGES_URL="${HELM_REPO_URL}"
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT

          git clone --branch gh-pages --single-branch \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "${tmp_dir}/gh-pages"

          cp "${CHART_PACKAGE}" "${tmp_dir}/gh-pages/"
          touch "${tmp_dir}/gh-pages/.nojekyll"
          printf '%s\n' "${HELM_REPO_DOMAIN}" > "${tmp_dir}/gh-pages/CNAME"

          if [[ -f "${tmp_dir}/gh-pages/index.yaml" ]]; then
            helm repo index "${tmp_dir}/gh-pages" \
              --url "${PAGES_URL}" \
              --merge "${tmp_dir}/gh-pages/index.yaml"
          else
            helm repo index "${tmp_dir}/gh-pages" --url "${PAGES_URL}"
          fi

          pushd "${tmp_dir}/gh-pages"
          if git diff --quiet --exit-code -- .; then
            echo "Helm repo already up to date"
            exit 0
          fi

          git add .nojekyll CNAME index.yaml "infra-operator-${VERSION}.tgz"
          git \
            -c user.name='github-actions[bot]' \
            -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
            commit -m "Publish infra-operator chart ${VERSION}"
          git push origin gh-pages
          popd

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          OWNER_LOWER="${GITHUB_REPOSITORY_OWNER,,}"
          NOTES=$(cat <<EOF
          Automated release for ${TAG}.

          Published artifacts:
          - Docker image: docker.io/${IMAGE_REPO}:${{ needs.prepare-release.outputs.version }}
          - Helm OCI: oci://ghcr.io/${OWNER_LOWER}/charts/infra-operator
          - Helm repo: https://sandbox0-ai.github.io/sandbox0
          EOF
          )

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --title "${TAG}" --notes "${NOTES}"
          else
            args=(--title "${TAG}" --notes "${NOTES}")
            if [[ "${{ needs.prepare-release.outputs.is_prerelease }}" == "true" ]]; then
              args+=(--prerelease)
            fi
            gh release create "${TAG}" "${args[@]}"
          fi
