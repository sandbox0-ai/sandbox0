name: Full E2E

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - "Dockerfile"
      - "Dockerfile.local"
      - "Makefile"
      - "regional-gateway/**"
      - "infra-operator/**"
      - "cluster-gateway/**"
      - "k8s-plugin/**"
      - "manager/**"
      - "netd/**"
      - "pkg/**"
      - "scheduler/**"
      - "storage-proxy/**"
      - "tests/**"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:

concurrency:
  group: full-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Prepare infra environment
        uses: ./.github/actions/prepare-infra
        with:
          infra-dir: .
          kind-config: tests/e2e/kind-config.yaml
          kind-cluster-name: sandbox0-e2e-${{ matrix.arch }}
          cache-key-suffix: ${{ matrix.arch }}

      - name: Run E2E
        env:
          E2E_USE_EXISTING_CLUSTER: "true"
          E2E_CLUSTER_NAME: sandbox0-e2e-${{ matrix.arch }}
        run: make test-e2e

      - name: Dump cluster state on failure
        if: failure()
        shell: bash
        run: |
          echo "=== pods ==="
          kubectl get pods -A -o wide || true
          echo "=== sandbox0-system events ==="
          kubectl -n sandbox0-system get events --sort-by=.lastTimestamp || true
          echo "=== infra-operator events ==="
          kubectl -n infra-operator get events --sort-by=.lastTimestamp || true
          echo "=== infra-operator logs ==="
          kubectl -n infra-operator logs deploy/infra-operator --all-containers --tail=-1 || true
          kind export logs "${RUNNER_TEMP}/kind-logs-${{ matrix.arch }}" --name "sandbox0-e2e-${{ matrix.arch }}" || true

      - name: Upload kind logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: full-e2e-kind-logs-${{ matrix.arch }}
          path: ${{ runner.temp }}/kind-logs-${{ matrix.arch }}
          if-no-files-found: ignore

      - name: Cleanup Kind cluster
        if: always()
        run: kind delete cluster --name "sandbox0-e2e-${{ matrix.arch }}" || true
