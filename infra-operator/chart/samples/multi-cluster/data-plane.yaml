# Example: Multi-cluster data plane (cluster-gateway + manager + ctld)
apiVersion: v1
kind: Namespace
metadata:
  name: sandbox0-system
---
apiVersion: infra.sandbox0.ai/v1alpha1
kind: Sandbox0Infra
metadata:
  name: s0dp
  namespace: sandbox0-system
spec:
  # Optional explicit enterprise license reference. When omitted, infra-operator
  # falls back to s0dp-enterprise-license / license.lic.
  # enterpriseLicense:
  #   secretRef:
  #     name: s0dp-enterprise-license
  #     key: license.lic
  database:
    # Must match the control plane database.
    type: external
    external:
      host: your-db.rds.amazonaws.com
      port: 5432
      database: sandbox0
      username: sandbox0
      passwordSecret:
        name: db-credentials
        key: password
  publicExposure:
    enabled: false
    rootDomain: sandbox0.app
    regionId: aws-us-east-1
  storage:
    # Data plane storage (choose s3 or oss for production).
    type: s3
    s3:
      bucket: sandbox0-prod
      region: us-east-1
      endpoint: https://s3.amazonaws.com
      credentialsSecret:
        name: aws-credentials
        accessKeyKey: accessKeyId
        secretKeyKey: secretAccessKey
    runtime: {}
  # Example OSS storage:
  # storage:
  #   type: oss
  #   oss:
  #     bucket: sandbox0-prod
  #     region: cn-hangzhou
  #     endpoint: https://oss-cn-hangzhou.aliyuncs.com
  #     credentialsSecret:
  #       name: oss-credentials
  #       accessKeyKey: accessKeyId
  #       secretKeyKey: accessKeySecret
  #   runtime: {}
  controlPlane:
    url: https://api.sandbox0.ai
    internalAuthPublicKeySecret:
      name: control-plane-public-key
      key: public.key
  registry:
    # Must match control-plane registry config in this region.
    # Data-plane uses this for pull secret propagation to sandbox namespaces.
    provider: aws
    imagePullSecretName: sandbox0-registry-pull
    aws:
      region: us-east-1
      registryId: "123456789012"
      registry: 123456789012.dkr.ecr.us-east-1.amazonaws.com
      pullSecret:
        name: ecr-pull-secret
        key: .dockerconfigjson
      credentialsSecret:
        name: aws-credentials
        accessKeyKey: accessKeyId
        secretKeyKey: secretAccessKey
  cluster:
    id: cluster-001
    name: Production US East 1
  builtinTemplates:
    - templateId: default
      image: sandbox0ai/otemplates:default-v0.2.0
      displayName: Default
      description: Builtin template installed by infra-operator.
      pool:
        minIdle: 1
        maxIdle: 5
    - templateId: openclaw
      image: ghcr.io/openclaw/openclaw:latest
      displayName: OpenClaw
      description: Builtin OpenClaw agent-in-sandbox template installed by infra-operator.
      pool:
        minIdle: 0
        maxIdle: 2
    - templateId: hermes
      image: nousresearch/hermes-agent:latest
      displayName: Hermes
      description: Builtin Hermes agent-in-sandbox template installed by infra-operator.
      pool:
        minIdle: 0
        maxIdle: 2
    - templateId: browser
      image: ghcr.io/steel-dev/steel-browser:latest
      displayName: Browser
      description: Builtin browser automation template installed by infra-operator.
      pool:
        minIdle: 0
        maxIdle: 2
    - templateId: coding-agent
      image: sandbox0ai/otemplates:coding-agent-v0.1.0
      displayName: Coding Agents
      description: Builtin coding-agent template with Codex, Claude Code, OpenCode, and Pi installed by infra-operator.
      pool:
        minIdle: 0
        maxIdle: 2
  # Shared placement for sandbox template Pods and the node-local ctld runtime.
  # In production, point this at your dedicated sandbox
  # node pool and pair it with services.manager.config.sandboxRuntimeClassName.
  # infra-operator manages sandbox0.ai/data-plane-ready; do not include it here.
  # The example below targets a Kata node pool; adjust labels and tolerations
  # for your cluster.
  #sandboxNodePlacement:
  #  nodeSelector:
  #    sandbox0.ai/node-role: sandbox
  #  tolerations:
  #    - key: sandbox0.ai/runtime
  #      operator: Equal
  #      value: kata
  #      effect: NoSchedule
  network: {}
  services:
    clusterGateway:
      enabled: true
      replicas: 1
      # service:
      #   type: ClusterIP
      #   port: 80
      service:
        type: NodePort
        port: 30080
      config:
        authMode: internal
    manager:
      enabled: true
      replicas: 1
      # config:
      #   sandboxRuntimeClassName: kata
