apiVersion: v1
kind: Namespace
metadata:
  name: sandbox0-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: manager
  namespace: sandbox0-system
  labels:
    app: manager
    component: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: manager
  template:
    metadata:
      labels:
        app: manager
        component: control-plane
    spec:
      serviceAccountName: manager
      containers:
        - name: manager
          image: sandbox0/manager:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: HTTP_PORT
              value: "8080"
            - name: METRICS_PORT
              value: "9090"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LOG_LEVEL
              value: "info"
            - name: CLEANUP_INTERVAL
              value: "60s"
            - name: RESYNC_PERIOD
              value: "30s"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: manager
  namespace: sandbox0-system
  labels:
    app: manager
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app: manager

---
apiVersion: v1
kind: Service
metadata:
  name: manager-metrics
  namespace: sandbox0-system
  labels:
    app: manager
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app: manager

