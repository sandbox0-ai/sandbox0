apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: internal-gateway
  namespace: sandbox0-system
spec:
  podSelector:
    matchLabels:
      app: internal-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from Ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8443
  # Allow traffic from within the namespace
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 8443
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
  # Allow PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Allow Manager
  - to:
    - podSelector:
        matchLabels:
          app: manager
    ports:
    - protocol: TCP
      port: 8080
  # Allow Storage Proxy
  - to:
    - podSelector:
        matchLabels:
          app: storage-proxy
    ports:
    - protocol: TCP
      port: 8081
  # Allow Procd pods (dynamic)
  - to:
    - podSelector:
        matchLabels:
          sandbox0.ai/component: procd
    ports:
    - protocol: TCP
      port: 49983

