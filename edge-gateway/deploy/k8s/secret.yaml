apiVersion: v1
kind: Secret
metadata:
  name: edge-gateway-secrets
  namespace: sandbox0-system
type: Opaque
stringData:
  # Database connection string
  # Replace with actual values in production
  database-url: "postgres://sandbox0:sandbox0@postgres.sandbox0-system:5432/sandbox0?sslmode=disable"
  # JWT secret for external API authentication
  jwt-secret: "change-me-in-production"
---
# Internal JWT key shared across services for inter-service authentication
apiVersion: v1
kind: Secret
metadata:
  name: internal-jwt-key
  namespace: sandbox0-system
type: Opaque
data:
  # Ed25519 private key in PEM format (base64 encoded)
  # Generate with: openssl genpkey -algorithm ed25519 -out internal_jwt_private.key
  # Then base64 encode: cat internal_jwt_private.key | base64
  internal_jwt_private.key: ""
