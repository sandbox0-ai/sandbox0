apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sandboxnetworkpolicies.sandbox0.ai
spec:
  group: sandbox0.ai
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - sandboxId
                - teamId
              properties:
                sandboxId:
                  type: string
                  description: "Unique identifier of the sandbox"
                teamId:
                  type: string
                  description: "Team that owns the sandbox"
                egress:
                  type: object
                  description: "Egress (outbound) traffic rules"
                  properties:
                    defaultAction:
                      type: string
                      enum: ["deny", "allow"]
                      default: "deny"
                    allowedCidrs:
                      type: array
                      items:
                        type: string
                    deniedCidrs:
                      type: array
                      items:
                        type: string
                    allowedDomains:
                      type: array
                      items:
                        type: string
                    deniedDomains:
                      type: array
                      items:
                        type: string
                    allowedPorts:
                      type: array
                      items:
                        type: object
                        properties:
                          port:
                            type: integer
                          protocol:
                            type: string
                            enum: ["tcp", "udp"]
                            default: "tcp"
                          endPort:
                            type: integer
                    enforceProxyPorts:
                      type: array
                      items:
                        type: integer
                    dnsPolicy:
                      type: object
                      properties:
                        allowedServers:
                          type: array
                          items:
                            type: string
                        allowDoH:
                          type: boolean
                        allowDoT:
                          type: boolean
                        allowQuic:
                          type: boolean
                    alwaysDeniedCidrs:
                      type: array
                      items:
                        type: string
                ingress:
                  type: object
                  description: "Ingress (inbound) traffic rules"
                  properties:
                    defaultAction:
                      type: string
                      enum: ["deny", "allow"]
                      default: "deny"
                    allowedSourceCidrs:
                      type: array
                      items:
                        type: string
                    deniedSourceCidrs:
                      type: array
                      items:
                        type: string
                    allowedPorts:
                      type: array
                      items:
                        type: object
                        properties:
                          port:
                            type: integer
                          protocol:
                            type: string
                            enum: ["tcp", "udp"]
                            default: "tcp"
                          endPort:
                            type: integer
                audit:
                  type: object
                  description: "Audit configuration"
                  properties:
                    level:
                      type: string
                      enum: ["off", "basic", "full"]
                      default: "basic"
                    sampleRate:
                      type: number
                      minimum: 0
                      maximum: 1
                      default: 1
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                lastAppliedTime:
                  type: string
                  format: date-time
                phase:
                  type: string
                  enum: ["Pending", "Applied", "Failed"]
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Sandbox
          type: string
          jsonPath: .spec.sandboxId
        - name: Team
          type: string
          jsonPath: .spec.teamId
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: sandboxnetworkpolicies
    singular: sandboxnetworkpolicy
    kind: SandboxNetworkPolicy
    shortNames:
      - snp

