affinity: {}
config:
    audit_file: /var/log/storage-proxy/audit.log
    audit_log: true
    cache_dir: /var/lib/storage-proxy/cache
    database_url: ""
    default_cache_size: 1G
    default_cluster_id: default
    grpc_addr: 0.0.0.0
    grpc_port: 8080
    http_addr: 0.0.0.0
    http_port: 8081
    kubeconfig_path: ""
    log_level: info
    max_bytes_per_second: 1073741824
    max_ops_per_second: 10000
    meta_url: ""
    metrics_enabled: true
    metrics_port: 9090
    s3_access_key: ""
    s3_bucket: ""
    s3_endpoint: ""
    s3_region: us-east-1
    s3_secret_key: ""
    s3_session_token: ""
fullnameOverride: ""
grpcService:
    port: 8080
    type: ClusterIP
httpService:
    port: 8081
    type: ClusterIP
image:
    pullPolicy: IfNotPresent
    repository: sandbox0ai/infra
    tag: ""
imagePullSecrets: []
livenessProbe:
    httpGet:
        path: /healthz
        port: http
    initialDelaySeconds: 10
    periodSeconds: 10
metricsService:
    port: 9090
    type: ClusterIP
nameOverride: ""
nodeSelector: {}
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
rbac:
    create: true
readinessProbe:
    httpGet:
        path: /readyz
        port: http
    initialDelaySeconds: 5
    periodSeconds: 5
replicaCount: 1
resources:
    limits:
        cpu: "2"
        memory: 4Gi
    requests:
        cpu: 500m
        memory: 1Gi
secrets:
    internalJwtPublicKeyKey: ""
    internalJwtSecretName: ""
securityContext:
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 1000
serviceAccount:
    annotations: {}
    automount: true
    create: true
    name: ""
tolerations: []
