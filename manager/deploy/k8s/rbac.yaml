apiVersion: v1
kind: ServiceAccount
metadata:
  name: manager
  namespace: sandbox0-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager
rules:
  # SandboxTemplate CRD
  - apiGroups: ["sandbox0.ai"]
    resources: ["sandboxtemplates"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["sandbox0.ai"]
    resources: ["sandboxtemplates/status"]
    verbs: ["get", "update", "patch"]
  
  # Pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # ReplicaSets
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["create", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: manager
subjects:
  - kind: ServiceAccount
    name: manager
    namespace: sandbox0-system

