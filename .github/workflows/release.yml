name: Release

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE_REPO: sandbox0ai/infra

permissions:
  contents: write
  packages: write

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      is_prerelease: ${{ steps.version.outputs.IS_PRERELEASE }}
    steps:
      - name: Extract and validate version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must be in the form vMAJOR.MINOR.PATCH[-PRERELEASE], got: ${GITHUB_REF_NAME}"
            exit 1
          fi

          if [[ "$VERSION" == *-* ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_OUTPUT"
          fi

  publish-image:
    name: Publish infra image
    runs-on: ubuntu-latest
    needs: prepare-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine Docker tags
        id: docker_tags
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          {
            echo "tags<<EOF"
            echo "${IMAGE_REPO}:${VERSION}"
            if [[ "${{ needs.prepare-release.outputs.is_prerelease }}" != "true" ]]; then
              echo "${IMAGE_REPO}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push infra image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          provenance: false

  publish-helm:
    name: Publish infra-operator Helm chart
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - publish-image
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Update chart version
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          sed -E -i "s/^version:.*/version: ${VERSION}/" infra-operator/chart/Chart.yaml
          sed -E -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" infra-operator/chart/Chart.yaml

      - name: Lint chart
        run: helm lint infra-operator/chart

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Publish chart to GitHub Packages (GHCR OCI)
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          OWNER_LOWER="${GITHUB_REPOSITORY_OWNER,,}"
          helm package infra-operator/chart --destination .cr-release-packages
          helm push ".cr-release-packages/infra-operator-${VERSION}.tgz" "oci://ghcr.io/${OWNER_LOWER}/charts"

      - name: Publish chart to Helm repo
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: infra-operator
          pages_branch: gh-pages
          charts_repo_url: https://sandbox0-ai.github.io/sandbox0
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          OWNER_LOWER="${GITHUB_REPOSITORY_OWNER,,}"
          NOTES=$(cat <<EOF
          Automated release for ${TAG}.

          Published artifacts:
          - Docker image: docker.io/${IMAGE_REPO}:${{ needs.prepare-release.outputs.version }}
          - Helm OCI: oci://ghcr.io/${OWNER_LOWER}/charts/infra-operator
          - Helm repo: https://sandbox0-ai.github.io/sandbox0
          EOF
          )

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --title "${TAG}" --notes "${NOTES}"
          else
            args=(--title "${TAG}" --notes "${NOTES}")
            if [[ "${{ needs.prepare-release.outputs.is_prerelease }}" == "true" ]]; then
              args+=(--prerelease)
            fi
            gh release create "${TAG}" "${args[@]}"
          fi
