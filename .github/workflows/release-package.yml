name: Release Package

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        required: false
        type: string
      upload_artifacts:
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      version:
        required: false
        type: string
      upload_artifacts:
        required: false
        type: boolean
        default: false
    outputs:
      artifact_run_id:
        description: Run ID that contains uploaded release artifacts.
        value: ${{ jobs.metadata.outputs.artifact_run_id }}

permissions:
  contents: read

env:
  IMAGE_REPO: sandbox0ai/infra

jobs:
  metadata:
    name: release-package / metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      upload_artifacts: ${{ steps.meta.outputs.upload_artifacts }}
      artifact_run_id: ${{ steps.meta.outputs.artifact_run_id }}
    steps:
      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          requested_version="${{ inputs.version }}"
          upload_artifacts="false"

          if [[ "${{ inputs.upload_artifacts }}" == "true" ]]; then
            upload_artifacts="true"
          fi

          if [[ -n "${requested_version}" ]]; then
            version="${requested_version}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.0.0-ci.${GITHUB_RUN_NUMBER}"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "upload_artifacts=${upload_artifacts}" >> "$GITHUB_OUTPUT"
          echo "artifact_run_id=${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

  dashboard-core:
    name: release-package / dashboard-core
    runs-on: ubuntu-latest
    needs: metadata
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Apply release version to dashboard-core
        run: npm version ${{ needs.metadata.outputs.version }} --workspace @sandbox0/dashboard-core --no-git-tag-version

      - name: Lint dashboard-core package
        run: npm run lint -w @sandbox0/dashboard-core

      - name: Test dashboard-core package
        run: npm run test -w @sandbox0/dashboard-core

      - name: Pack dashboard-core package
        id: pack
        shell: bash
        run: |
          mkdir -p .release-npm
          pack_file="$(npm pack -w @sandbox0/dashboard-core --pack-destination .release-npm | tail -n 1)"
          echo "pack_file=.release-npm/${pack_file}" >> "$GITHUB_OUTPUT"

      - name: Upload dashboard-core package artifact
        if: ${{ needs.metadata.outputs.upload_artifacts == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-core-package-${{ needs.metadata.outputs.version }}
          path: ${{ steps.pack.outputs.pack_file }}
          if-no-files-found: error

  website-docs:
    name: release-package / website-docs
    if: ${{ needs.metadata.outputs.upload_artifacts != 'true' }}
    runs-on: ubuntu-latest
    needs: metadata
    timeout-minutes: 30
    steps:
      - name: Detect sandbox0-cloud validation token
        id: token
        env:
          GH_TOKEN: ${{ secrets.SANDBOX0_CLOUD_REPO_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN}" ]]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SANDBOX0_CLOUD_REPO_TOKEN is not configured; skipping sandbox0-cloud website validation in release-package."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve sandbox0 validation inputs
        if: steps.token.outputs.available == 'true'
        id: inputs
        run: |
          set -euo pipefail

          SANDBOX0_REPOSITORY="${GITHUB_REPOSITORY}"
          SANDBOX0_REF="${GITHUB_SHA}"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            SANDBOX0_REPOSITORY="${{ github.event.pull_request.head.repo.full_name }}"
            SANDBOX0_REF="${{ github.event.pull_request.head.sha }}"
          fi

          echo "sandbox0_repository=${SANDBOX0_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "sandbox0_ref=${SANDBOX0_REF}" >> "$GITHUB_OUTPUT"

      - name: Dispatch website validation workflow
        if: steps.token.outputs.available == 'true'
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.SANDBOX0_CLOUD_REPO_TOKEN }}
        run: |
          set -euo pipefail

          dispatch_time="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          gh workflow run website.yml \
            --repo sandbox0-ai/sandbox0-cloud \
            --ref main \
            -f sandbox0_repository="${{ steps.inputs.outputs.sandbox0_repository }}" \
            -f sandbox0_ref="${{ steps.inputs.outputs.sandbox0_ref }}" \
            -f docs_github_repository="${GITHUB_REPOSITORY}" \
            -f docs_build_versions="${{ needs.metadata.outputs.tag }}" \
            -f docs_include_next="false" \
            -f docs_download_release_bundles="0" \
            -f upload_release_bundle="false" \
            -f deploy_to_pages="false"

          echo "dispatch_time=${dispatch_time}" >> "$GITHUB_OUTPUT"

      - name: Wait for website validation workflow
        if: steps.token.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ secrets.SANDBOX0_CLOUD_REPO_TOKEN }}
          DISPATCH_TIME: ${{ steps.dispatch.outputs.dispatch_time }}
        run: |
          set -euo pipefail

          run_id=""
          for attempt in $(seq 1 30); do
            run_id="$(
              gh api "repos/sandbox0-ai/sandbox0-cloud/actions/workflows/website.yml/runs?event=workflow_dispatch&branch=main&per_page=20" \
                | python3 -c 'import json, os, sys; from datetime import datetime; dispatch_time = datetime.fromisoformat(os.environ["DISPATCH_TIME"].replace("Z", "+00:00")); data = json.load(sys.stdin); print(next((str(run["id"]) for run in data.get("workflow_runs", []) if datetime.fromisoformat(run["created_at"].replace("Z", "+00:00")) >= dispatch_time), ""))'
            )"

            if [[ -n "${run_id}" ]]; then
              break
            fi

            sleep 10
          done

          if [[ -z "${run_id}" ]]; then
            echo "Timed out waiting for sandbox0-cloud website validation workflow to start."
            exit 1
          fi

          gh run watch "${run_id}" --repo sandbox0-ai/sandbox0-cloud --interval 10 --exit-status

  infra:
    name: release-package / infra
    runs-on: ubuntu-latest
    needs: metadata
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Free runner space
        uses: ./.github/actions/free-runner-space

      - name: Restore infra build cache
        uses: ./.github/actions/restore-infra-build-cache
        with:
          cache-key-suffix: release-package-amd64

      - name: Setup protoc
        uses: arduino/setup-protoc@v3

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Build local binaries
        run: make build-local-all

      - name: Build unified infra image from local binaries
        env:
          TAG: release-package
        run: docker build -t "${IMAGE_REPO}:${TAG}" -f Dockerfile.local .

      - name: Validate and package Helm chart
        run: |
          VERSION="${{ needs.metadata.outputs.version }}"
          sed -E -i "s/^version:.*/version: ${VERSION}/" infra-operator/chart/Chart.yaml
          sed -E -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" infra-operator/chart/Chart.yaml
          helm lint infra-operator/chart
          helm package infra-operator/chart --destination .cr-release-packages
          test -f ".cr-release-packages/infra-operator-${VERSION}.tgz"

      - name: Upload Helm chart artifact
        if: ${{ needs.metadata.outputs.upload_artifacts == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: infra-operator-chart-${{ needs.metadata.outputs.version }}
          path: .cr-release-packages/infra-operator-${{ needs.metadata.outputs.version }}.tgz
          if-no-files-found: error
